---
- name: Configure workstation
  hosts: "{{ target | default(lookup('file', '/etc/dotfiles-machine', errors='ignore') | default('localhost')) }}"
  gather_facts: true

  pre_tasks:
    - name: Set convenience facts
      ansible.builtin.set_fact:
        is_desktop: "{{ is_desktop | default(inventory_hostname in groups.get('desktop', [])) }}"
        is_laptop: "{{ is_laptop | default(false) }}"
        brew_bin: "{{ brew_prefix }}/bin"
      tags: always

    - name: Ensure brew is in PATH for this run
      ansible.builtin.set_fact:
        ansible_env_path: "{{ brew_bin }}:{{ ansible_facts['env']['PATH'] }}"
      tags: always

  environment:
    PATH: "{{ brew_bin | default('/home/linuxbrew/.linuxbrew/bin') }}:/home/linuxbrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

  roles:
    - role: sudo
      tags: [system, sudo]
    # Phase 1: System + packages (no secrets needed)
    - role: sshd
      tags: [system, sshd]
    - role: apk_packages
      tags: [system, packages, apk]
    - role: homebrew
      tags: [packages, homebrew]
    - role: bitwarden
      tags: [secrets, bitwarden]
    - role: shell
      tags: [dotfiles, shell]
    - role: pi
      tags: [dotfiles, pi]
    - role: git
      tags: [dotfiles, git]
    - role: neovim
      tags: [dotfiles, neovim, editor]

    # Phase 2: Secrets + auth
    - role: ssh_keys
      tags: [secrets, ssh, ssh_keys]
    - role: github
      tags: [secrets, github]
    - role: tailscale
      tags: [secrets, tailscale]
    - role: kube
      tags: [secrets, kube]
      when: is_desktop | bool and not skip_kube | default(false)

    # Phase 3: Desktop apps
    - role: flatpak
      tags: [packages, desktop, flatpak]
      when: is_desktop | bool and not skip_flatpak | default(false)
    - role: bluefin_common
      tags: [desktop, bluefin]
      when: is_desktop | bool and not skip_bluefin | default(false)
    - role: gnome
      tags: [desktop, gnome]
      when: is_desktop | bool and not skip_gnome | default(false)
    - role: zen_browser
      tags: [desktop, browser, zen_browser]
      when: is_desktop | bool and not skip_zen_browser | default(false)
    - role: easyeffects
      tags: [desktop, audio, easyeffects]
      when: is_desktop | bool

    # Phase 4: Services
    - role: monitoring
      tags: [services, monitoring]
      when: inventory_hostname not in groups.get('vps', []) and not skip_monitoring | default(false)
    - role: syncthing
      tags: [services, syncthing]
      when: inventory_hostname not in groups.get('vps', []) and not skip_syncthing | default(false)
    - role: systemd
      tags: [services, systemd]
    - role: homepage
      tags: [services, homepage]
      when: inventory_hostname not in groups.get('vps', []) and not skip_homepage | default(false)
    - role: bst_dashboard
      tags: [services, bst_dashboard]
    - role: authentik
      tags: [services, identity, sso]
      when: inventory_hostname == 'bihar'
    - role: n8n
      tags: [services, automation]
      when: inventory_hostname == 'bihar'
    - role: appflowy
      tags: [services, appflowy]
      when: inventory_hostname == 'bihar'
    - role: proxy
      tags: [services, proxy, caddy]
      when: inventory_hostname not in groups.get('vps', []) and not skip_proxy | default(false)
    - role: tailscale_cert
      tags: [services, tailscale_cert]
      when: inventory_hostname not in groups.get('vps', []) and not skip_tailscale_cert | default(false)
    - role: cockpit
      tags: [services, cockpit]
      when: (is_desktop | bool or inventory_hostname in groups.get('server', [])) and not skip_cockpit | default(false)
    - role: lima
      tags: [services, lima]
      when: (is_desktop | bool or inventory_hostname == 'bihar') and not skip_lima | default(false)
    - role: server_hardening
      tags: [system, hardening, security]
      when: inventory_hostname in groups.get('server', []) or inventory_hostname in groups.get('vps', [])

  post_tasks:
    - name: Summarise secrets phase
      ansible.builtin.debug:
        msg: >-
          {% if 'secrets' in (ansible_skip_tags | default([])) %}
          [secrets phase] SKIPPED (--skip-tags secrets). Run `dots-apply` to include
          ssh_keys, github, kube, tailscale, monitoring, browser_fxa, and shell secrets.
          {% elif not (bw_unlocked | default(false)) %}
          [secrets phase] Bitwarden vault was LOCKED — BW-touching tasks in
          ssh_keys, github, kube, tailscale, monitoring, browser_fxa, and shell
          were skipped. To enable: `bw unlock`, write the session to
          /tmp/bw_session, then re-run.
          {% else %}
          [secrets phase] vault unlocked — all secret roles executed normally.
          {% endif %}
      tags: always
