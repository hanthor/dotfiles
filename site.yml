---
- name: Configure workstation
  hosts: "{{ target | default(lookup('file', '/etc/dotfiles-machine', errors='ignore') | default('localhost')) }}"
  gather_facts: true

  pre_tasks:
    - name: Set convenience facts
      ansible.builtin.set_fact:
        is_desktop: "{{ is_desktop | default(inventory_hostname in groups.get('desktop', [])) }}"
        brew_bin: "{{ brew_prefix }}/bin"
      tags: always

    - name: Ensure brew is in PATH for this run
      ansible.builtin.set_fact:
        ansible_env_path: "{{ brew_bin }}:{{ ansible_facts['env']['PATH'] }}"
      tags: always

  environment:
    PATH: "{{ brew_bin | default('/home/linuxbrew/.linuxbrew/bin') }}:/home/linuxbrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

  roles:
    # Phase 1: System + packages (no secrets needed)
    - role: sshd
      tags: [system, sshd]
    - role: homebrew
      tags: [packages, homebrew]
    - role: shell
      tags: [dotfiles, shell]
    - role: git
      tags: [dotfiles, git]

    # Phase 2: Secrets + auth
    - role: bitwarden
      tags: [secrets, bitwarden]
    - role: ssh_keys
      tags: [secrets, ssh, ssh_keys]
    - role: github
      tags: [secrets, github]
    - role: tailscale
      tags: [secrets, tailscale]

    # Phase 3: Desktop apps
    - role: flatpak
      tags: [packages, desktop, flatpak]
      when: is_desktop | bool
    - role: gnome
      tags: [desktop, gnome]
      when: is_desktop | bool
    - role: zen_browser
      tags: [desktop, browser, zen_browser]
      when: is_desktop | bool

    # Phase 4: Services
    - role: monitoring
      tags: [services, monitoring]
      when: inventory_hostname not in groups.get('vps', [])
    - role: syncthing
      tags: [services, syncthing]
      when: inventory_hostname not in groups.get('vps', [])
    - role: systemd
      tags: [services, systemd]
    - role: netbox
      tags: [services, secrets, netbox]
      when: inventory_hostname in groups.get('server', [])
    - role: homepage
      tags: [services, homepage]
      when: inventory_hostname not in groups.get('vps', [])
    - role: proxy
      tags: [services, proxy, caddy]
      when: inventory_hostname not in groups.get('vps', [])
    - role: lima
      tags: [services, lima]
      when: is_desktop | bool or inventory_hostname == 'bihar'
    - role: netbox_agent
      tags: [services, secrets, netbox, netbox_agent]
      when: inventory_hostname not in groups.get('desktop', [])
