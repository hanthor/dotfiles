# Build and push custom hive image (v2 + pi + DeepSeek) to GHCR
name: Build Hive Image

on:
  push:
    branches:
      - master
    paths:
      - 'talos-k8s/hive/**'
      - '.github/workflows/hive-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (for custom Dockerfile)
        uses: actions/checkout@v4
        with:
          path: dotfiles

      - name: Checkout kubestellar/hive v2 (for source)
        uses: actions/checkout@v4
        with:
          repository: kubestellar/hive
          ref: v2
          path: hive-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Patch source for pi backend
        working-directory: hive-src
        run: |
          # Add pi to hive's CLI marker list so it recognizes pi sessions
          sed -i '/"Gemini",/a\	"pi",' v2/pkg/agent/manager.go
          # Add pi to allowed backend list in config validation
          sed -i 's/"claude": true, "copilot": true, "gemini": true, "goose": true/"claude": true, "copilot": true, "gemini": true, "goose": true, "pi": true/' v2/pkg/config/config.go
          # Add pi to backendBinary() lookup map
          sed -i '/"goose":   "goose",/a\		"pi":      "pi",' v2/pkg/agent/manager.go
          # Fix input prompt detection: pi uses alternate screen so ❯ never appears.
          # Check for "deepseek-v4-pro" (always in pi's footer) as ready marker.
          sed -i 's/strings.Contains(output, "❯")/(strings.Contains(output, "❯") || strings.Contains(output, "deepseek-v4-pro"))/' v2/pkg/agent/manager.go
          # Verify patches applied
          echo "=== Verification ==="
          grep -c '"pi"' v2/pkg/agent/manager.go && echo "pi in cliPaneMarkers"
          grep -c 'deepseek-v4-pro' v2/pkg/agent/manager.go && echo "deepseek-v4-pro in prompt check"
          grep -c '"pi": true' v2/pkg/config/config.go && echo "pi in validBackends"

      - name: Build Go binaries
        working-directory: hive-src
        run: |
          GIT_HASH=$(git rev-parse HEAD)
          GIT_SHORT=$(git rev-parse --short HEAD)
          cd v2
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.gitHash=${GIT_HASH} -X main.gitShort=${GIT_SHORT}" \
            -o ../hive-binary ./cmd/hive
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../bd-binary ./cmd/bd

      - name: Prep build context
        working-directory: hive-src
        run: |
          # Use our custom Dockerfile and pi wrapper
          cp ../dotfiles/talos-k8s/hive/Dockerfile ./Dockerfile
          cp ../dotfiles/talos-k8s/hive/pi-wrapper.sh ./pi-wrapper.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./hive-src
          file: ./hive-src/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hive:latest
            ghcr.io/${{ github.repository_owner }}/hive:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true

      - name: Verify gh CLI in image
        run: |
          docker run --rm ghcr.io/${{ github.repository_owner }}/hive:latest ls -la /usr/local/bin/gh-real || echo "FAIL: gh-real not found"
