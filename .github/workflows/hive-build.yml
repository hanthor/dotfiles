# Build and push custom hive image (upstream v2 + goose + DeepSeek) to GHCR
name: Build Hive Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'talos-k8s/hive/Dockerfile'
      - 'talos-k8s/hive/goose-config.yaml'
      - 'talos-k8s/hive/hive.yaml'
      - '.github/workflows/hive-build.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (for custom Dockerfile + goose config)
        uses: actions/checkout@v4
        with:
          path: dotfiles

      - name: Checkout kubestellar/hive v2 (for source)
        uses: actions/checkout@v4
        with:
          repository: kubestellar/hive
          ref: v2
          path: hive-src

      - name: Patch source for goose 1.37.0 compatibility
        working-directory: hive-src
        run: |
          # Goose 1.37.0 uses "goose is ready" instead of ❯ prompt.
          # Patch both waitForInputPrompt functions to also check for this.
          sed -i 's/strings.Contains(output, "❯")/(strings.Contains(output, "❯") || strings.Contains(output, "goose is ready"))/g' v2/pkg/agent/manager.go

      - name: Prep build context
        working-directory: hive-src
        run: |
          # Copy our custom Dockerfile (adds goose + DeepSeek)
          cp ../dotfiles/talos-k8s/hive/Dockerfile ./Dockerfile
          # Copy goose DeepSeek provider config
          cp ../dotfiles/talos-k8s/hive/goose-config.yaml ./goose-config.yaml
          # Copy goose wrapper (old CLI -> 1.37.0 subcommands)
          cp ../dotfiles/talos-k8s/hive/goose-wrapper.sh ./goose-wrapper.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./hive-src
          file: ./hive-src/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hive:latest
            ghcr.io/${{ github.repository_owner }}/hive:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true
