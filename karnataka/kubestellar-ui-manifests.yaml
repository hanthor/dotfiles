# Source: kubestellar-ui/templates/configmap-nginx.yaml
# Nginx configuration for frontend to properly proxy API calls
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  labels:
    app: frontend
    component: webserver
data:
  default.conf: |
    # Use Kubernetes DNS resolver
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;
    
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;
        
        location / {
            try_files $uri /index.html;
        }

        error_page 404 /index.html;

        # Login endpoint - proxy to backend
        location /login {
            set $backend backend.kubestellar.svc.cluster.local:4000;
            proxy_pass http://$backend/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes - preserve full path including /api
        location ~ ^/api/(.*)$ {
            set $backend backend.kubestellar.svc.cluster.local:4000;
            proxy_pass http://$backend/api/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
---
# Source: kubestellar-ui/templates/configmap-postgresql.yaml
# PostgreSQL initialization ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  labels:
    app: postgresql
    component: database
data:
  000001_init_schema.up.sql: |
    -- Create users table
    CREATE TABLE IF NOT EXISTS users (
    	id SERIAL PRIMARY KEY,
    	username VARCHAR(255) UNIQUE NOT NULL,
    	password VARCHAR(255) NOT NULL,
    	is_admin BOOLEAN DEFAULT FALSE,
    	created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    	updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- Create user_permissions table
    CREATE TABLE IF NOT EXISTS user_permissions (
    	id SERIAL PRIMARY KEY,
    	user_id INTEGER REFERENCES users(id) ON DELETE CASCADE,
    	component VARCHAR(255) NOT NULL,
    	permission VARCHAR(50) NOT NULL CHECK (permission IN ('read', 'write')),
    	created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    	UNIQUE(user_id, component)
    );

    -- Create indexes for better performance
    CREATE INDEX IF NOT EXISTS idx_users_username ON users(username);
    CREATE INDEX IF NOT EXISTS idx_users_is_admin ON users(is_admin);
    CREATE INDEX IF NOT EXISTS idx_user_permissions_user_id ON user_permissions(user_id);
    CREATE INDEX IF NOT EXISTS idx_user_permissions_component ON user_permissions(component);
