apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-rocm
  namespace: vllm
  labels:
    app: vllm-rocm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-rocm
  template:
    metadata:
      labels:
        app: vllm-rocm
    spec:
      containers:
      - name: vllm-rocm
        image: vllm/vllm-openai:latest-rocm
        imagePullPolicy: IfNotPresent
        args:
        - --model
        - Qwen/Qwen2.5-Coder-7B-Instruct
        - --trust-remote-code
        - --max-model-len
        - "4096"
        - --gpu-memory-utilization
        - "0.85"
        env:
        - name: HSA_OVERRIDE_GFX_VERSION
          value: "11.0.2" # Force RDNA3 compatibility for AMD Strix Halo (gfx1151)
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "4"
            memory: 16Gi
            amd.com/gpu: "1"
          limits:
            cpu: "8"
            memory: 48Gi
            amd.com/gpu: "1"
        securityContext:
          privileged: true # Allow raw access to direct rendering and memory architectures
        volumeMounts:
        - name: cache-volume
          mountPath: /root/.cache/huggingface
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: vllm-model-cache
