# Ansible NetBox Inventory Configuration
# Documentation: https://docs.ansible.com/ansible/latest/collections/netbox/netbox/nb_inventory_inventory.html

plugin: netbox.netbox.nb_inventory
api_endpoint: "https://bihar.manatee-basking.ts.net:8444"
# The token should be set via NETBOX_API_TOKEN environment variable
token: "{{ lookup('env', 'NETBOX_API_TOKEN') }}"
validate_certs: false
config_context: true
group_by:
  - device_roles
  - tags
  - sites
device_query_filters:
  - has_primary_ip: 'true'
