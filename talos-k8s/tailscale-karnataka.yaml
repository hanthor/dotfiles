# Tailscale ExtensionServiceConfig for karnataka (worker)
# Apply: talosctl -n 192.168.0.6 patch mc -p @talos-k8s/tailscale-karnataka.yaml
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=REPLACE_WITH_AUTH_KEY
  - TS_HOSTNAME=karnataka
  - TS_ACCEPT_DNS=true
