apiVersion: v1
kind: PersistentVolume
metadata:
  name: lemonade-cache-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /var/tmp/lemonade-cache
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - karnataka
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: lemonade-models-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /var/tmp/lemonade-models
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - karnataka
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lemonade-cache
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lemonade-models
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lemonade
  namespace: default
  labels:
    app: lemonade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lemonade
  template:
    metadata:
      labels:
        app: lemonade
    spec:
      nodeSelector:
        kubernetes.io/hostname: karnataka
      hostNetwork: true
      hostIPC: true
      containers:
      - name: lemonade
        image: ghcr.io/lemonade-sdk/lemonade-server:latest
        securityContext:
          seccompProfile:
            type: Unconfined
          runAsGroup: 44
          capabilities:
            add:
            - SYS_PTRACE
        env:
        - name: HSA_OVERRIDE_GFX_VERSION
          value: "11.5.1"
        - name: PYTORCH_ROCM_ARCH
          value: "gfx1151"
        - name: HSA_XNACK
          value: "1"
        - name: HSA_FORCE_FINE_GRAIN_PCIE
          value: "1"
        - name: HF_HOME
          value: /root/.cache/huggingface
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        ports:
        - containerPort: 13305
          name: http
        resources:
          limits:
            cpu: "16"
            memory: 56Gi
            amd.com/gpu: "1"
          requests:
            cpu: "8"
            memory: 48Gi
            amd.com/gpu: "1"
        volumeMounts:
        - name: cache-volume
          mountPath: /root/.cache/huggingface
        - name: models-volume
          mountPath: /opt/lemonade/llama
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: lemonade-cache
      - name: models-volume
        persistentVolumeClaim:
          claimName: lemonade-models
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "16Gi"
---
# NodePort exposes Lemonade OpenAI-compatible API on 192.168.0.6:313305
apiVersion: v1
kind: Service
metadata:
  name: lemonade
  namespace: default
  labels:
    app: lemonade
spec:
  type: NodePort
  selector:
    app: lemonade
  ports:
  - name: http
    port: 13305
    targetPort: 13305
    nodePort: 31305
