# KubeStellar Hive Contributor — Goose agent backed by Lemonade Qwen3.6-35B
#
# Namespace + ConfigMap + Secret are generated by the upstream command:
#   cd /path/to/kubestellar/hive
#   just contribute-k8s kubestellar-hive | kubectl apply -f -
#
# Then deploy the contributor pod:
#   kubectl apply -f manifest.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contributor
  namespace: kubestellar-hive
  labels:
    app.kubernetes.io/name: hive-contributor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hive-contributor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive-contributor
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: contributor
        image: ghcr.io/kubestellar/hive-contributor:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: hive-contributor-config
        env:
        - name: GOOSE_PROVIDER
          value: openai
        - name: GOOSE_MODEL
          value: Qwen3.6-35B-GGUF
        - name: OPENAI_BASE_URL
          value: https://lemonade.manatee-basking.ts.net/v1
        - name: OPENAI_API_KEY
          value: dummy
        - name: HIVE_REGISTRATION_TOKEN
          valueFrom:
            secretKeyRef:
              name: hive-contributor-secrets
              key: HIVE_REGISTRATION_TOKEN
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: hive-contributor-secrets
              key: GH_TOKEN
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 2Gi
        volumeMounts:
        - name: config
          mountPath: /home/dev/.config/hive
      volumes:
      - name: config
        emptyDir: {}
