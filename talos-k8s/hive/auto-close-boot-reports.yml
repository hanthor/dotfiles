# Auto-close boot-report issues older than 7 days
# Add to: tuna-os/tunaOS/.github/workflows/auto-close-boot-reports.yml
name: Close Stale Boot Reports

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  close-boot-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale boot-report issues
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'boot-report',
              state: 'open',
              per_page: 100,
            });

            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 7);

            for (const issue of issues) {
              const created = new Date(issue.created_at);
              if (created < cutoff) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '🤖 Auto-closing boot report older than 7 days.',
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
                console.log(`Closed #${issue.number}: ${issue.title}`);
              }
            }
            console.log('Done.');
