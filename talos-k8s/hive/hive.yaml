# Hive — 24/7 AI agent supervisor for GitHub repos
#
# Deploy:
#   1. Create secrets first:
#      kubectl create secret generic hive-secrets -n hive \
#        --from-literal=DEEPSEEK_API_KEY=sk-... \
#        --from-literal=GOOSE_API_HOST=https://api.deepseek.com \
#        --from-literal=HIVE_GITHUB_TOKEN=ghp_... \
#        --from-literal=NTFY_TOPIC=your-ntfy-topic \
#        --dry-run=client -o yaml | kubectl apply -f -
#
#      # For GitHub App (post-setup):
#      kubectl create secret generic hive-secrets -n hive \
#        --from-literal=GH_APP_ID=... \
#        --from-literal=GH_APP_INSTALLATION_ID=... \
#        --from-file=gh-app-key.pem=/path/to/key.pem \
#        --dry-run=client -o yaml | kubectl apply -f -
#
#   2. kubectl apply -f talos-k8s/hive.yaml
#
# Access: https://hive.manatee-basking.ts.net
---
apiVersion: v1
kind: Namespace
metadata:
  name: hive
  labels:
    app.kubernetes.io/name: hive
    app.kubernetes.io/part-of: hive
---
# Secrets — create manually with kubectl, not in this file.
# See deploy instructions above.
# Secret name: hive-secrets
# Required keys:
#   DEEPSEEK_API_KEY  — DeepSeek API key (sk-...)
#   GOOSE_API_HOST    — https://api.deepseek.com
#   HIVE_GITHUB_TOKEN — GitHub PAT or App token
#   NTFY_TOPIC        — ntfy.sh topic string
# Optional:
#   HIVE_DASHBOARD_TOKEN — mutation endpoint auth (omit for no auth)
#   GH_APP_ID, GH_APP_INSTALLATION_ID, gh-app-key.pem — GitHub App
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-config
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
data:
  goose-wrapper.sh: |
    #!/bin/sh
    # goose-wrapper — runs goose v1.x in a restart loop so clear_on_kick works.
    #
    # Why no script(1) or pipe: piping 'y' to script closes stdin after telemetry,
    # so tmux send-keys can't reach goose. Running goose-real directly means the
    # tmux PTY is goose's stdin — send-keys delivers boot/kick prompts correctly.
    #
    # Why the loop: clear_on_kick sends ^C to kill the running session. trap '' INT
    # makes the wrapper ignore SIGINT so only goose-real is killed. The loop then
    # re-emits the ready markers the Go binary watches for before sending the next
    # prompt via send-keys.
    trap '' INT
    while [ $# -gt 0 ]; do
        case "$1" in
            --no-confirm) shift ;;
            --model) shift 2 ;;
            --prompt) shift 2 ;;
            *) shift ;;
        esac
    done
    GOOSE_CFG=/home/dev/.config/goose/config.yaml
    mkdir -p "$(dirname "$GOOSE_CFG")" /home/dev/.local/state/goose
    rm -f "$GOOSE_CFG"
    cat > "$GOOSE_CFG" << 'YAML'
    provider: custom_deepseek
    model: deepseek-chat
    GOOSE_TELEMETRY_ENABLED: false
    YAML
    while true; do
        echo "DeepSeek chat ready ❯"
        echo "Environment loaded"
        /usr/local/bin/goose-real session --max-turns 100 || true
    done
  patch-dashboard.sh: |
    #!/bin/sh
    # Patch dashboard KNOWN_MODELS to include DeepSeek models.
    # Uses Python for reliable in-place string replacement (avoids sed quoting hell).
    python3 << 'PYEOF'
    import sys
    path = '/opt/hive/proxy/public/index.html'
    marker = "{ value: 'gpt-5.2', label: 'GPT-5.2' },"
    inject = "\n      { value: 'deepseek-chat', label: 'DeepSeek Chat' },\n      { value: 'deepseek-reasoner', label: 'DeepSeek Reasoner' },"
    with open(path) as f:
        c = f.read()
    if marker in c and 'deepseek-chat' not in c:
        with open(path, 'w') as f:
            f.write(c.replace(marker, marker + inject, 1))
        print('patch-dashboard: injected deepseek models')
    else:
        print('patch-dashboard: already patched or marker not found')
    PYEOF
  hive.yaml: |
    project:
      org: hanthor
      name: "TunaOS"
      repos:
        - tuna-os/tunaos
        - tuna-os/tacklebox
      ai_author: hanthor
      primary_repo: tuna-os/tunaos

    acmm_level: 3

    agents:
      supervisor:
        enabled: true
        backend: goose
        model: deepseek-chat
        beads_dir: /data/beads/supervisor
        clear_on_kick: true
      scanner:
        enabled: true
        backend: goose
        model: deepseek-chat
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/scanner
        clear_on_kick: true
      ci-maintainer:
        enabled: true
        backend: goose
        model: deepseek-chat
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/ci-maintainer
        clear_on_kick: true
      quality:
        enabled: false
      guide:
        enabled: false
      brainstorm:
        enabled: false

    governor:
      eval_interval_s: 300
      modes:
        surge:
          threshold: 50
          scanner: 15m
          ci-maintainer: pause
        busy:
          threshold: 10
          scanner: 15m
          ci-maintainer: 1h
        quiet:
          threshold: 2
          scanner: 15m
          ci-maintainer: 45m
        idle:
          threshold: 0
          scanner: 15m
          ci-maintainer: 15m

    github:
      app_id: 3942065
      installation_id: 137498420
      key_file: /secrets/gh-app-key.pem

    dashboard:
      port: 3002

    notifications:
      ntfy:
        server: https://ntfy.sh
        topic: ${NTFY_TOPIC}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hive-data
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive
        app.kubernetes.io/component: controller
    spec:
      nodeSelector:
        kubernetes.io/hostname: bihar
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: hive
          image: ghcr.io/hanthor/hive:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /etc/hive/goose-wrapper.sh /usr/local/bin/goose
              chmod +x /usr/local/bin/goose
              sh /etc/hive/patch-dashboard.sh
              exec /usr/local/bin/entrypoint.sh --config /etc/hive/hive.yaml
          stdin: true
          tty: true
          ports:
            - name: dashboard
              containerPort: 3001
              protocol: TCP
            - name: api
              containerPort: 3002
              protocol: TCP
            - name: ttyd
              containerPort: 7681
              protocol: TCP
          env:
            # DeepSeek API
            - name: GOOSE_PROVIDER
              value: custom_deepseek
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hive-secrets
                  key: DEEPSEEK_API_KEY
            # GitHub App auth
            - name: GH_APP_ID
              value: "3942065"
            - name: GH_APP_INSTALLATION_ID
              value: "137498420"
            - name: GH_APP_KEY_FILE
              value: /secrets/gh-app-key.pem
            # ntfy notifications
            - name: NTFY_TOPIC
              valueFrom:
                secretKeyRef:
                  name: hive-secrets
                  key: NTFY_TOPIC
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/hive
              readOnly: true
            - name: data
              mountPath: /data
            - name: secrets
              mountPath: /secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: hive-config
        - name: data
          persistentVolumeClaim:
            claimName: hive-data
        - name: secrets
          secret:
            secretName: hive-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: hive
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hive
  ports:
    - name: dashboard
      port: 3001
      targetPort: dashboard
      protocol: TCP
    - name: api
      port: 3002
      targetPort: api
      protocol: TCP
    - name: ttyd
      port: 7681
      targetPort: ttyd
      protocol: TCP
---
# Tailscale Ingress — hive.manatee-basking.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hive
  namespace: hive
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: hive
      port:
        number: 3001
  tls:
    - hosts:
        - hive
