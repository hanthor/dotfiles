# Hive v2 Configuration — TunaOS project, goose + DeepSeek backend
# Deploy: kubectl apply -f hive.yaml && kubectl rollout restart deploy/hive -n hive
#
# Secrets (create before deploy):
#   kubectl create secret generic hive-secrets -n hive \
#     --from-literal=DEEPSEEK_API_KEY=sk-... \
#     --from-literal=HIVE_GITHUB_TOKEN=... \
#     --from-literal=NTFY_TOPIC=your-topic \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# For GitHub App auth (preferred):
#   kubectl create secret generic hive-secrets -n hive \
#     --from-literal=GH_APP_ID=3942065 \
#     --from-literal=GH_APP_INSTALLATION_ID=137498420 \
#     --from-file=gh-app-key.pem=/path/to/key.pem \
#     --from-literal=NTFY_TOPIC=your-topic \
#     --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: Namespace
metadata:
  name: hive
  labels:
    app.kubernetes.io/name: hive
    app.kubernetes.io/part-of: hive
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-config
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
data:
  hive.yaml: |
    project:
      org: hanthor
      name: TunaOS
      repos:
        - tuna-os/tunaos
        - tuna-os/tromso
        - tuna-os/tacklebox
      ai_author: hanthor
      primary_repo: tuna-os/tunaos

    acmm_level: 6

    agents:
      supervisor:
        enabled: true
        backend: goose
        model: deepseek-v4-pro
        beads_dir: /data/beads/supervisor
        clear_on_kick: false
        bead_role: supervisor
      scanner:
        enabled: true
        backend: goose
        model: deepseek-v4-flash
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/scanner
        clear_on_kick: false
      ci-maintainer:
        enabled: true
        backend: goose
        model: deepseek-v4-flash
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/ci-maintainer
        clear_on_kick: false
      quality:
        enabled: true
        backend: goose
        model: deepseek-v4-flash
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/quality
        clear_on_kick: false
      guide:
        enabled: true
        backend: goose
        model: deepseek-v4-flash
        beads_dir: /data/beads/guide
        clear_on_kick: false
      sec-check:
        enabled: true
        backend: goose
        model: deepseek-v4-flash
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/sec-check
        clear_on_kick: false
      architect:
        enabled: true
        backend: goose
        model: deepseek-v4-pro
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/architect
        clear_on_kick: false
      strategist:
        enabled: true
        backend: goose
        model: deepseek-v4-pro
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/strategist
        clear_on_kick: false
      outreach:
        enabled: true
        backend: goose
        model: deepseek-v4-flash
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/outreach
        clear_on_kick: false
      brainstorm:
        enabled: false

    governor:
      eval_interval_s: 300
      modes:
        surge:
          threshold: 70
          supervisor: 5m
          scanner: 15m
          ci-maintainer: pause
          quality: 1h
          guide: 1h
          architect: 2h
          strategist: 2h
          sec-check: 1h
          outreach: 2h
        busy:
          threshold: 10
          supervisor: 5m
          scanner: 15m
          ci-maintainer: 1h
          quality: 2h
          guide: 2h
          architect: 4h
          strategist: 4h
          sec-check: 2h
          outreach: 4h
        quiet:
          threshold: 2
          supervisor: 10m
          scanner: 15m
          ci-maintainer: 45m
          quality: 4h
          guide: 4h
          architect: 6h
          strategist: 6h
          sec-check: 4h
          outreach: 6h
        idle:
          threshold: 0
          supervisor: 15m
          scanner: 15m
          ci-maintainer: 15m
          quality: 6h
          guide: 6h
          architect: 8h
          strategist: 8h
          sec-check: 6h
          outreach: 8h

    github:
      app_id: 3942065
      installation_id: 137498420
      key_file: /var/run/hive-metrics/gh-app-key.pem

    dashboard:
      port: 3002

    notifications:
      ntfy:
        server: https://ntfy.sh
        topic: ${NTFY_TOPIC}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hive-data
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive
        app.kubernetes.io/component: controller
    spec:
      nodeSelector:
        kubernetes.io/hostname: bihar
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: hive
          image: ghcr.io/hanthor/hive:latest
          imagePullPolicy: Always
          args:
            - "-c"
            - |
              # Fix goose state directory permissions for agent UIDs.
              # The PVC mount overrides image permissions, so fix at runtime.
              mkdir -p /data/home/.local/state/goose /data/home/.config/goose
              chmod -R 777 /data/home/.local /data/home/.config 2>/dev/null || true
              exec /usr/local/bin/entrypoint.sh --config /etc/hive/hive.yaml
          command:
            - /bin/sh
          stdin: true
          tty: true
          ports:
            - name: dashboard
              containerPort: 3001
              protocol: TCP
            - name: api
              containerPort: 3002
              protocol: TCP
            - name: ttyd
              containerPort: 7681
              protocol: TCP
          env:
            # DeepSeek API key for goose
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hive-secrets
                  key: DEEPSEEK_API_KEY
            # Goose provider (pre-seeded in image, re-export for safety)
            - name: GOOSE_PROVIDER
              value: custom_deepseek
            - name: GOOSE_MODEL
              value: deepseek-v4-pro
            # GitHub App auth
            - name: GH_APP_ID
              value: "3942065"
            - name: GH_APP_INSTALLATION_ID
              value: "137498420"
            - name: GH_APP_KEY_FILE
              value: /secrets/gh-app-key.pem
            # ntfy notifications
            - name: NTFY_TOPIC
              valueFrom:
                secretKeyRef:
                  name: hive-secrets
                  key: NTFY_TOPIC
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/hive
              readOnly: true
            - name: data
              mountPath: /data
            - name: secrets
              mountPath: /secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: config
          configMap:
            name: hive-config
        - name: data
          persistentVolumeClaim:
            claimName: hive-data
        - name: secrets
          secret:
            secretName: hive-secrets
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: hive
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hive
  ports:
    - name: dashboard
      port: 3001
      targetPort: dashboard
      protocol: TCP
    - name: api
      port: 3002
      targetPort: api
      protocol: TCP
    - name: ttyd
      port: 7681
      targetPort: ttyd
      protocol: TCP
---
# Tailscale Ingress — hive.manatee-basking.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hive
  namespace: hive
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: hive
      port:
        number: 3001
  tls:
    - hosts:
        - hive
