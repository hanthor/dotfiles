# Hive — 24/7 AI agent supervisor for GitHub repos
#
# Deploy:
#   1. Create secrets first:
#      kubectl create secret generic hive-secrets -n hive \
#        --from-literal=DEEPSEEK_API_KEY=sk-... \
#        --from-literal=HIVE_GITHUB_TOKEN=ghp_... \
#        --from-literal=NTFY_TOPIC=your-ntfy-topic \
#        --dry-run=client -o yaml | kubectl apply -f -
#
#      # For GitHub App (post-setup):
#      kubectl create secret generic hive-secrets -n hive \
#        --from-literal=GH_APP_ID=... \
#        --from-literal=GH_APP_INSTALLATION_ID=... \
#        --from-file=gh-app-key.pem=/path/to/key.pem \
#        --dry-run=client -o yaml | kubectl apply -f -
#
#   2. kubectl apply -f talos-k8s/hive.yaml
#
# Access: https://hive.manatee-basking.ts.net
---
apiVersion: v1
kind: Namespace
metadata:
  name: hive
  labels:
    app.kubernetes.io/name: hive
    app.kubernetes.io/part-of: hive
---
# Secrets — create manually with kubectl, not in this file.
# See deploy instructions above.
# Secret name: hive-secrets
# Required keys:
#   DEEPSEEK_API_KEY  — DeepSeek API key (sk-...)
#   HIVE_GITHUB_TOKEN — GitHub PAT or App token
#   NTFY_TOPIC        — ntfy.sh topic string
# Optional:
#   HIVE_DASHBOARD_TOKEN — mutation endpoint auth (omit for no auth)
#   GH_APP_ID, GH_APP_INSTALLATION_ID, gh-app-key.pem — GitHub App
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-config
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
data:
  pi-wrapper.sh: |
    #!/bin/sh
    # pi-wrapper — runs pi (coding agent) in a restart loop so clear_on_kick works.
    #
    # Pi natively supports DeepSeek — no proxy, no litellm, no reasoning_content
    # workaround needed. Boot/kick prompts arrive via tmux send-keys.
    #
    # Why the loop: clear_on_kick sends ^C to kill the running session. trap '' INT
    # makes the wrapper ignore SIGINT so only pi-real is killed. The loop then
    # re-emits the ready markers the Go binary watches for before sending the next
    # prompt via send-keys.
    trap '' INT

    # ── Parse CLI args (Hive passes --no-confirm, --model, --prompt) ──
    MODEL="deepseek-v4-pro"
    while [ $# -gt 0 ]; do
        case "$1" in
            --no-confirm) shift ;;  # pi has no permission popups
            --model) MODEL="$2"; shift 2 ;;
            --prompt) shift 2 ;;   # boot prompt comes via send-keys
            *) shift ;;
        esac
    done

    # ── pi config ────────────────────────────────────────────────────
    PI_CONFIG_DIR="${PI_CODING_AGENT_DIR:-/home/dev/.pi/agent}"
    mkdir -p "$PI_CONFIG_DIR"
    cat > "$PI_CONFIG_DIR/settings.json" << 'JSON'
    {
      "defaultProvider": "deepseek",
      "defaultModel": "deepseek-v4-pro",
      "quietStartup": true,
      "hideThinkingBlock": true,
      "enableInstallTelemetry": false
    }
    JSON

    # ── Session directory (persistent across restarts) ───────────────
    SESSION_DIR="/data/pi-sessions/${HIVE_AGENT:-agent}"
    mkdir -p "$SESSION_DIR"

    # ── TLS: Go tools (gh, git) and curl need the proxy CA cert ─────
    if [ -f /data/proxy-ca.pem ]; then
        export SSL_CERT_FILE=/data/proxy-ca.pem
        export NODE_EXTRA_CA_CERTS=/data/proxy-ca.pem
        export GIT_SSL_CAINFO=/data/proxy-ca.pem
    fi

    # ── Main loop ────────────────────────────────────────────────────
    while true; do
        echo "DeepSeek chat ready ❯"
        echo "Environment loaded"
        /usr/local/bin/pi-real \
            --provider deepseek \
            --model "$MODEL" \
            --no-context-files \
            --session-dir "$SESSION_DIR" || true
    done
  backends.conf: |
    # backends.conf — Single source of truth for CLI backends and model names.
    # Overrides the built-in config with pi support.
    #
    # Usage:
    #   source /usr/local/etc/hive/backends.conf
    #
    #   model=$(normalize_model_for_backend "pi" "deepseek-v4-pro")

    # ── Supported backends ────────────────────────────────────────────
    KNOWN_BACKENDS="claude copilot bob gemini codex amazonq goose aider pi"

    # ── Backend → binary mapping ──────────────────────────────────────
    backend_binary() {
      case "$1" in
        claude)  echo "claude" ;;
        copilot) echo "copilot" ;;
        gemini)  echo "gemini" ;;
        codex)   echo "codex" ;;
        amazonq) echo "q" ;;
        bob)     echo "bob" ;;
        goose)   echo "goose" ;;
        aider)   echo "aider" ;;
        pi)      echo "pi" ;;
        *)       echo "$1" ;;
      esac
    }

    # ── Backend → permission flag ─────────────────────────────────────
    backend_perm_flag() {
      case "$1" in
        claude)  echo "--dangerously-skip-permissions" ;;
        copilot) echo "--allow-all" ;;
        bob)     echo "--accept-license" ;;
        gemini)  echo "--yolo" ;;
        codex)   echo "--full-auto" ;;
        amazonq) echo "--trust-all-tools" ;;
        goose)   echo "--no-confirm" ;;
        aider)   echo "--yes" ;;
        pi)      echo "" ;;  # pi has no permission popups
        *)       echo "" ;;
      esac
    }

    # ── Model version format normalization ────────────────────────────
    normalize_model_for_backend() {
      local backend="$1" model="$2"
      case "$backend" in
        copilot)
          echo "$model" | sed -E 's/([0-9]+)-([0-9]+)$/\1.\2/'
          ;;
        claude)
          echo "$model" | sed -E 's/([0-9]+)\.([0-9]+)$/\1-\2/'
          ;;
        *)
          echo "$model"
          ;;
      esac
    }

    detect_backend_from_model() {
      local model="$1"
      case "$model" in
        gpt-*)     echo "copilot" ;;
        gemini-*)  echo "gemini" ;;
        claude-*)  echo "claude" ;;
        deepseek-*) echo "pi" ;;
        *)         echo "unknown" ;;
      esac
    }

    models_equal() {
      local a="$1" b="$2"
      local na nb
      na=$(echo "$a" | sed -E 's/([0-9]+)\.([0-9]+)$/\1-\2/')
      nb=$(echo "$b" | sed -E 's/([0-9]+)\.([0-9]+)$/\1-\2/')
      [ "$na" = "$nb" ]
    }

    model_tier() {
      case "$1" in
        claude-haiku-4-5*|claude-haiku-4.5*)   echo "haiku" ;;
        claude-sonnet-4-6*|claude-sonnet-4.6*) echo "sonnet" ;;
        claude-opus-4-6*|claude-opus-4.6*)     echo "opus" ;;
        claude-opus-4-7*|claude-opus-4.7*)     echo "opus" ;;
        gpt-*)                                  echo "gpt" ;;
        gemini-*)                               echo "gemini" ;;
        deepseek-*)                             echo "deepseek" ;;
        *)                                      echo "unknown" ;;
      esac
    }
  patch-dashboard.sh: |
    #!/bin/sh
    # Patch dashboard KNOWN_MODELS to include DeepSeek models.
    # Uses Python for reliable in-place string replacement (avoids sed quoting hell).
    python3 << 'PYEOF'
    import sys
    path = '/opt/hive/proxy/public/index.html'
    marker = "{ value: 'gpt-5.2', label: 'GPT-5.2' },"
    inject = "\n      { value: 'deepseek-v4-flash', label: 'DeepSeek V4 Flash' },\n      { value: 'deepseek-v4-pro', label: 'DeepSeek V4 Pro' },"
    with open(path) as f:
        c = f.read()
    if marker in c and 'deepseek-v4-flash' not in c:
        with open(path, 'w') as f:
            f.write(c.replace(marker, marker + inject, 1))
        print('patch-dashboard: injected deepseek models')
    else:
        print('patch-dashboard: already patched or marker not found')
    PYEOF
  hive.yaml: |
    project:
      org: hanthor
      name: "TunaOS"
      repos:
        - tuna-os/tunaos
      ai_author: hanthor
      primary_repo: tuna-os/tunaos

    acmm_level: 5

    agents:
      supervisor:
        enabled: true
        backend: pi
        model: deepseek-v4-pro
        beads_dir: /data/beads/supervisor
        clear_on_kick: true
      scanner:
        enabled: true
        backend: pi
        model: deepseek-v4-pro
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/scanner
        clear_on_kick: true
      ci-maintainer:
        enabled: true
        backend: pi
        model: deepseek-v4-pro
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/ci-maintainer
        clear_on_kick: true
      quality:
        enabled: true
        backend: pi
        model: deepseek-v4-pro
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/quality
        clear_on_kick: true
      sec-check:
        enabled: true
        backend: pi
        model: deepseek-v4-pro
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/sec-check
        clear_on_kick: true
      architect:
        enabled: true
        backend: pi
        model: deepseek-v4-pro
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/architect
        clear_on_kick: true
      strategist:
        enabled: true
        backend: pi
        model: deepseek-v4-pro
        mode: ISSUES_AND_PRS
        beads_dir: /data/beads/strategist
        clear_on_kick: true
      guide:
        enabled: true
        backend: pi
        model: deepseek-v4-pro
        beads_dir: /data/beads/guide
        clear_on_kick: true
      brainstorm:
        enabled: false

    governor:
      eval_interval_s: 300
      modes:
        surge:
          threshold: 50
          scanner: 15m
          ci-maintainer: pause
        busy:
          threshold: 10
          scanner: 15m
          ci-maintainer: 1h
        quiet:
          threshold: 2
          scanner: 15m
          ci-maintainer: 45m
        idle:
          threshold: 0
          scanner: 15m
          ci-maintainer: 15m

    github:
      app_id: 3942065
      installation_id: 137498420
      key_file: /secrets/gh-app-key.pem

    dashboard:
      port: 3002

    notifications:
      ntfy:
        server: https://ntfy.sh
        topic: ${NTFY_TOPIC}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hive-data
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive
        app.kubernetes.io/component: controller
    spec:
      nodeSelector:
        kubernetes.io/hostname: bihar
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: hive
          image: ghcr.io/hanthor/hive:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /etc/hive/pi-wrapper.sh /usr/local/bin/pi
              chmod +x /usr/local/bin/pi
              cp /etc/hive/backends.conf /usr/local/etc/hive/backends.conf
              sh /etc/hive/patch-dashboard.sh
              exec /usr/local/bin/entrypoint.sh --config /etc/hive/hive.yaml
          stdin: true
          tty: true
          ports:
            - name: dashboard
              containerPort: 3001
              protocol: TCP
            - name: api
              containerPort: 3002
              protocol: TCP
            - name: ttyd
              containerPort: 7681
              protocol: TCP
          env:
            # DeepSeek API (pi natively supports DeepSeek)
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hive-secrets
                  key: DEEPSEEK_API_KEY
            # GitHub App auth
            - name: GH_APP_ID
              value: "3942065"
            - name: GH_APP_INSTALLATION_ID
              value: "137498420"
            - name: GH_APP_KEY_FILE
              value: /secrets/gh-app-key.pem
            # ntfy notifications
            - name: NTFY_TOPIC
              valueFrom:
                secretKeyRef:
                  name: hive-secrets
                  key: NTFY_TOPIC
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/hive
              readOnly: true
            - name: data
              mountPath: /data
            - name: secrets
              mountPath: /secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: hive-config
        - name: data
          persistentVolumeClaim:
            claimName: hive-data
        - name: secrets
          secret:
            secretName: hive-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: hive
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hive
  ports:
    - name: dashboard
      port: 3001
      targetPort: dashboard
      protocol: TCP
    - name: api
      port: 3002
      targetPort: api
      protocol: TCP
    - name: ttyd
      port: 7681
      targetPort: ttyd
      protocol: TCP
---
# Tailscale Ingress — hive.manatee-basking.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hive
  namespace: hive
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: hive
      port:
        number: 3001
  tls:
    - hosts:
        - hive
