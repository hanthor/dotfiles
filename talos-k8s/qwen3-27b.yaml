apiVersion: v1
kind: PersistentVolume
metadata:
  name: qwen3-27b-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /var/tmp/qwen3-27b
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - karnataka
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen3-27b
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-27b
  namespace: default
  labels:
    app: qwen3-27b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen3-27b
  template:
    metadata:
      labels:
        app: qwen3-27b
    spec:
      nodeSelector:
        kubernetes.io/hostname: karnataka
      hostNetwork: true
      hostIPC: true
      containers:
      - name: qwen3-27b
        image: vllm/vllm-openai-rocm:latest
        securityContext:
          seccompProfile:
            type: Unconfined
          runAsGroup: 44
          capabilities:
            add:
            - SYS_PTRACE
        args:
        - --model
        - Qwen/Qwen3-27B
        - --port
        - "8000"
        - --host
        - 0.0.0.0
        - --trust-remote-code
        - --enforce-eager
        - --enable-chunked-prefill
        - --max-model-len
        - "16384"
        env:
        - name: HSA_OVERRIDE_GFX_VERSION
          value: "11.5.1"
        - name: PYTORCH_ROCM_ARCH
          value: "gfx1151"
        - name: HSA_XNACK
          value: "1"
        - name: HSA_FORCE_FINE_GRAIN_PCIE
          value: "1"
        - name: VLLM_ROCM_USE_AITER
          value: "0"
        - name: HF_HOME
          value: /root/.cache/huggingface
        ports:
        - containerPort: 8000
          name: http
        resources:
          limits:
            cpu: "16"
            memory: 56Gi
            amd.com/gpu: "1"
          requests:
            cpu: "8"
            memory: 48Gi
            amd.com/gpu: "1"
        volumeMounts:
        - name: cache-volume
          mountPath: /root/.cache/huggingface
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: qwen3-27b
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "16Gi"
---
# NodePort exposes vLLM OpenAI API on 192.168.0.6:30800
apiVersion: v1
kind: Service
metadata:
  name: qwen3-27b
  namespace: default
  labels:
    app: qwen3-27b
spec:
  type: NodePort
  selector:
    app: qwen3-27b
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30800
