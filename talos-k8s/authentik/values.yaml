# Authentik SSO — Helm values
# Chart: authentik/authentik (https://charts.goauthentik.io)
#
# Deploy:
#   kubectl create ns authentik
#   kubectl label ns authentik pod-security.kubernetes.io/enforce=privileged --overwrite
#   helm repo add authentik https://charts.goauthentik.io
#   helm upgrade --install authentik authentik/authentik \
#     --namespace authentik --values authentik/values.yaml

global:
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secret
          key: secret-key
    - name: AUTHENTIK_ERROR_REPORTING__ENABLED
      value: "false"
    - name: AUTHENTIK_EMAIL__HOST
      value: ""  # No outbound email configured

authentik:
  log_level: info
  avatars: initials  # No Gravatar calls
  error_reporting:
    enabled: false
  # PostgreSQL connection — auto-populated when postgresql.enabled=true
  # On re-installs, pass the existing PG password:
  #   --set authentik.postgresql.password="$(kubectl get secret -n authentik authentik-postgresql -o jsonpath='{.data.password}' | base64 -d)"

# PostgreSQL (bundled via Bitnami sub-chart)
postgresql:
  enabled: true
  auth:
    username: authentik
    database: authentik
    # Password auto-generated by chart
    # existingSecret: authentik-postgres
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Redis (bundled sub-chart — recommended for caching/websockets)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false  # Internal-only on cluster network
  master:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

server:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    ingressClassName: tailscale
    hosts:
      - auth.manatee-basking.ts.net
    tls:
      - hosts:
          - auth.manatee-basking.ts.net
  # Persist uploaded media (user avatars, app icons, etc.)
  persistence:
    media:
      enabled: true
      storageClass: longhorn
      size: 5Gi

worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
