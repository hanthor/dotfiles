# RBAC for the argo service account to manage KubeVirt VMs in bluefin-test namespace.
# Also covers bluefin-lts-test (used by the matrix workflow).
# Fixes: https://github.com/projectbluefin/testing-lab/issues/153
---
apiVersion: v1
kind: Namespace
metadata:
  name: bluefin-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-kubevirt
  namespace: bluefin-test
rules:
  - apiGroups: [kubevirt.io]
    resources: [virtualmachines, virtualmachineinstances]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-kubevirt
  namespace: bluefin-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-kubevirt
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
---
apiVersion: v1
kind: Namespace
metadata:
  name: bluefin-lts-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-kubevirt
  namespace: bluefin-lts-test
rules:
  - apiGroups: [kubevirt.io]
    resources: [virtualmachines, virtualmachineinstances]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-kubevirt
  namespace: bluefin-lts-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-kubevirt
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
