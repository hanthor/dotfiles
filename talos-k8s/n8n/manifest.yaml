# n8n — workflow automation (plain K8s manifest, no Helm needed)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: n8n
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: n8n
        image: n8nio/n8n:latest
        ports:
        - containerPort: 5678
          name: http
        env:
        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: encryption-key
        - name: DB_TYPE
          value: sqlite
        - name: DB_SQLITE_DATABASE
          value: /data/n8n.sqlite
        - name: N8N_HOST
          value: n8n.manatee-basking.ts.net
        - name: N8N_PROTOCOL
          value: https
        - name: WEBHOOK_URL
          value: https://n8n.manatee-basking.ts.net
        - name: EXECUTIONS_TIMEOUT
          value: "120"
        - name: N8N_METRICS
          value: "false"
        - name: N8N_DIAGNOSTICS_ENABLED
          value: "false"
        - name: N8N_TEMPLATES_ENABLED
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: n8n-data
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
spec:
  selector:
    app: n8n
  ports:
  - name: http
    port: 80
    targetPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: n8n
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: n8n
      port:
        number: 80
  tls:
  - hosts:
    - n8n
