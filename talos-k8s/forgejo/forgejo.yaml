# Forgejo — self-hosted Git service with Actions CI/CD
# Accessible at: https://forgejo.manatee-basking.ts.net
#
# Admin user is pre-created via env vars from forgejo-admin secret.
# To set/reset admin credentials:
#   kubectl create secret generic forgejo-admin \
#     --from-literal=username=admin \
#     --from-literal=password=<STRONG_PASSWORD> \
#     --from-literal=email=admin@example.com \
#     -n forgejo --dry-run=client -o yaml | kubectl apply -f -
#
# Runner token is auto-created by the forgejo-setup Job below.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  namespace: forgejo
  labels:
    app: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      nodeSelector:
        kubernetes.io/hostname: karnataka
      securityContext:
        fsGroup: 1000
      containers:
        - name: forgejo
          image: code.forgejo.org/forgejo/forgejo:15.0.2-rootless
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            # Admin user pre-creation (only used on first run / fresh DB)
            - name: FORGEJO__admin__USERNAME
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin
                  key: username
            - name: FORGEJO__admin__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin
                  key: password
            - name: FORGEJO__admin__EMAIL
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin
                  key: email
            - name: FORGEJO__database__DB_TYPE
              value: sqlite3
            - name: FORGEJO__database__PATH
              value: /data/forgejo.db
            - name: FORGEJO__server__DOMAIN
              value: forgejo.manatee-basking.ts.net
            - name: FORGEJO__server__ROOT_URL
              value: https://forgejo.manatee-basking.ts.net
            - name: FORGEJO__server__HTTP_PORT
              value: "3000"
            - name: FORGEJO__server__SSH_DOMAIN
              value: forgejo.manatee-basking.ts.net
            - name: FORGEJO__server__SSH_PORT
              value: "22"
            - name: FORGEJO__server__SSH_LISTEN_PORT
              value: "2222"
            - name: FORGEJO__server__START_SSH_SERVER
              value: "true"
            - name: FORGEJO__server__LFS_START_SERVER
              value: "true"
            - name: FORGEJO__actions__ENABLED
              value: "true"
            - name: FORGEJO__actions__DEFAULT_ACTIONS_URL
              value: "https://github.com"
            - name: FORGEJO__repository__DEFAULT_MIRROR_REPO_UNITS
              value: "repo.code,repo.releases,repo.issues,repo.wiki,repo.projects,repo.packages,repo.actions"
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: "false"
            - name: FORGEJO__repository__ENABLE_PUSH_CREATE_USER
              value: "true"
            - name: FORGEJO__repository__DEFAULT_PRIVATE
              value: "private"
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app: forgejo
spec:
  type: ClusterIP
  selector:
    app: forgejo
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
# Tailscale ingress — creates forgejo.manatee-basking.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgejo
  namespace: forgejo
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: forgejo
      port:
        number: 3000
  tls:
    - hosts:
        - forgejo
