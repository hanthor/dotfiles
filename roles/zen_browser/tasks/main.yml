---
- name: Add Zen Browser to GNOME dock
  ansible.builtin.shell: |
    python3 << 'EOF'
    import subprocess, ast, os
    os.environ['DBUS_SESSION_BUS_ADDRESS'] = f"unix:path=/run/user/{os.getuid()}/bus"
    result = subprocess.run(
        ['gsettings', 'get', 'org.gnome.shell', 'favorite-apps'],
        capture_output=True, text=True)
    apps = ast.literal_eval(result.stdout.strip()) if result.stdout.strip() else []
    zen = 'app.zen_browser.zen.desktop'
    if zen not in apps:
        apps.insert(0, zen)
        subprocess.run(['gsettings', 'set', 'org.gnome.shell', 'favorite-apps', repr(apps)])
    EOF
  changed_when: false
  ignore_errors: true

- name: Set Zen Browser as default browser
  ansible.builtin.shell: |
    for mime in x-scheme-handler/http x-scheme-handler/https x-scheme-handler/ftp \
                text/html text/xml application/xhtml+xml application/xml; do
      xdg-mime default app.zen_browser.zen.desktop "$mime"
    done
  changed_when: false
  ignore_errors: true

- name: Check if Zen Browser profiles.ini exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.var/app/app.zen_browser.zen/.zen/profiles.ini"
  register: zen_profiles_ini

- name: Skip if Zen Browser is not installed
  ansible.builtin.meta: end_role
  when: not zen_profiles_ini.stat.exists

- name: Find Zen Browser profile path
  ansible.builtin.shell: |
    python3 -c "
    import configparser
    c = configparser.ConfigParser()
    c.read('{{ ansible_facts['env']['HOME'] }}/.var/app/app.zen_browser.zen/.zen/profiles.ini')
    print(c['Profile0']['Path'])
    "
  register: zen_profile_path
  changed_when: false

- name: Copy user.js to Zen Browser profile
  ansible.builtin.copy:
    src: user.js
    dest: "{{ ansible_facts['env']['HOME'] }}/.var/app/app.zen_browser.zen/.zen/{{ zen_profile_path.stdout }}/user.js"
    mode: "0644"

- name: Deploy policies.json to Flatpak bundle directory (ensures Bitwarden extension is force-installed)
  ansible.builtin.copy:
    src: policies.json
    dest: /var/lib/flatpak/app/app.zen_browser.zen/current/active/files/bin/distribution/policies.json
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Ensure Zen Browser distribution directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.zen/distribution"
    state: directory
    mode: "0755"

- name: Copy policies.json to Zen Browser user distribution (fallback)
  ansible.builtin.copy:
    src: policies.json
    dest: "{{ ansible_facts['env']['HOME'] }}/.zen/distribution/policies.json"
    mode: "0644"

# ── Firefox Accounts sign-in ──────────────────────────────────────────────────

- name: Create venv for PyFxA
  ansible.builtin.command:
    cmd: python3 -m venv {{ ansible_facts['env']['HOME'] }}/.local/venvs/fxa
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/venvs/fxa/bin/python"

- name: Install PyFxA into venv
  ansible.builtin.pip:
    name: PyFxA
    state: present
    virtualenv: "{{ ansible_facts['env']['HOME'] }}/.local/venvs/fxa"

- name: Copy FxA sign-in script
  ansible.builtin.copy:
    src: fxa_signin.py
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/fxa_signin.py"
    mode: "0700"

- name: Fetch Firefox Account credentials from Bitwarden
  ansible.builtin.command: bw get item "{{ fxa_bw_item | default('firefox-account') }}"
  register: fxa_item_raw
  no_log: true
  failed_when: false
  changed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
    BW_SESSION: "{{ bw_session | default('') }}"

- name: Fetch Firefox Account TOTP from Bitwarden
  ansible.builtin.command: bw get totp "{{ fxa_bw_item | default('firefox-account') }}"
  register: fxa_totp_raw
  no_log: true
  failed_when: false
  changed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
    BW_SESSION: "{{ bw_session | default('') }}"

- name: Warn if Firefox Account credentials not found in Bitwarden
  ansible.builtin.debug:
    msg: >-
      Could not fetch Firefox Account credentials from Bitwarden
      (item '{{ fxa_bw_item | default('firefox-account') }}' not found or vault locked) — skipping FxA sign-in.
  when: >-
    fxa_item_raw.rc is not defined
    or fxa_item_raw.rc != 0
    or fxa_totp_raw.rc is not defined
    or fxa_totp_raw.rc != 0

- name: Sign in to Firefox Accounts for Zen Browser
  ansible.builtin.command: >
    {{ ansible_facts['env']['HOME'] }}/.local/venvs/fxa/bin/python {{ ansible_facts['env']['HOME'] }}/.local/bin/fxa_signin.py
  register: fxa_signin_result
  no_log: true
  changed_when: "'Wrote signedInUser.json' in fxa_signin_result.stdout"
  failed_when: fxa_signin_result.rc not in [0]
  when:
    - fxa_item_raw.rc is defined and fxa_item_raw.rc == 0
    - fxa_totp_raw.rc is defined and fxa_totp_raw.rc == 0
    - (fxa_item_raw.stdout | default('')) | length > 0
    - (fxa_totp_raw.stdout | default('')) | length > 0
  environment:
    FXA_EMAIL: "{{ (fxa_item_raw.stdout | from_json).login.username }}"
    FXA_PASSWORD: "{{ (fxa_item_raw.stdout | from_json).login.password }}"
    FXA_TOTP: "{{ fxa_totp_raw.stdout | trim }}"

- name: Show Firefox Accounts sign-in result
  ansible.builtin.debug:
    msg: "{{ fxa_signin_result.stdout }}"
  when:
    - fxa_signin_result is defined
    - fxa_signin_result.stdout is defined
    - fxa_signin_result.stdout | length > 0
