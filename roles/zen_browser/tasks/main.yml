---
- name: Add Zen Browser to GNOME dock
  ansible.builtin.shell: |
    python3 << 'EOF'
    import subprocess, ast, os
    os.environ['DBUS_SESSION_BUS_ADDRESS'] = f"unix:path=/run/user/{os.getuid()}/bus"
    result = subprocess.run(
        ['gsettings', 'get', 'org.gnome.shell', 'favorite-apps'],
        capture_output=True, text=True)
    apps = ast.literal_eval(result.stdout.strip()) if result.stdout.strip() else []
    zen = 'app.zen_browser.zen.desktop'
    if zen not in apps:
        apps.insert(0, zen)
        subprocess.run(['gsettings', 'set', 'org.gnome.shell', 'favorite-apps', repr(apps)])
    EOF
  changed_when: false
  ignore_errors: true

- name: Set Zen Browser as default browser
  ansible.builtin.shell: |
    for mime in x-scheme-handler/http x-scheme-handler/https x-scheme-handler/ftp \
                text/html text/xml application/xhtml+xml application/xml; do
      xdg-mime default app.zen_browser.zen.desktop "$mime"
    done
  changed_when: false
  ignore_errors: true

- name: Check if Zen Browser profiles.ini exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.var/app/app.zen_browser.zen/.zen/profiles.ini"
  register: zen_profiles_ini

- name: Skip if Zen Browser is not installed
  ansible.builtin.meta: end_role
  when: not zen_profiles_ini.stat.exists

- name: Find Zen Browser profile path
  ansible.builtin.shell: |
    python3 -c "
    import configparser
    c = configparser.ConfigParser()
    c.read('{{ ansible_facts['env']['HOME'] }}/.var/app/app.zen_browser.zen/.zen/profiles.ini')
    print(c['Profile0']['Path'])
    "
  register: zen_profile_path
  changed_when: false

- name: Copy user.js to Zen Browser profile
  ansible.builtin.copy:
    src: user.js
    dest: "{{ ansible_facts['env']['HOME'] }}/.var/app/app.zen_browser.zen/.zen/{{ zen_profile_path.stdout }}/user.js"
    mode: "0644"

- name: Ensure Zen Browser distribution directory exists (Flatpak bundle)
  ansible.builtin.file:
    path: /var/lib/flatpak/app/app.zen_browser.zen/current/active/files/zen/distribution
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy policies.json to Flatpak bundle directory (ensures Bitwarden extension is force-installed)
  ansible.builtin.copy:
    src: policies.json
    dest: /var/lib/flatpak/app/app.zen_browser.zen/current/active/files/zen/distribution/policies.json
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Ensure Zen Browser distribution directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.zen/distribution"
    state: directory
    mode: "0755"

- name: Copy policies.json to Zen Browser user distribution (fallback)
  ansible.builtin.copy:
    src: policies.json
    dest: "{{ ansible_facts['env']['HOME'] }}/.zen/distribution/policies.json"
    mode: "0644"

# ── Firefox Accounts sign-in ──────────────────────────────────────────────────

- name: Sign in to Firefox Accounts (Zen Browser)
  ansible.builtin.include_role:
    name: hanthor.browser_fxa
  vars:
    fxa_browsers: "{{ fxa_browsers | default(['zen']) }}"
