---
- name: Ensure podman group exists
  ansible.builtin.group:
    name: podman
    system: true
    state: present
  become: true

- name: Add user to podman group
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['USER'] }}"
    groups: podman
    append: true
  become: true

- name: Create podman socket drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/podman.socket.d
    state: directory
    mode: "0755"
  become: true

- name: Deploy podman socket drop-in for group access
  ansible.builtin.copy:
    dest: /etc/systemd/system/podman.socket.d/group-access.conf
    mode: "0644"
    content: |
      [Socket]
      SocketGroup=podman
      SocketMode=0660
      DirectoryMode=0710
  become: true
  notify: Restart podman socket

- name: Enable and start rootful podman socket
  ansible.builtin.systemd:
    name: podman.socket
    scope: system
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Create systemd user directory
  ansible.builtin.file:
    path: ~/.config/systemd/user
    state: directory
    mode: "0755"

- name: Deploy dotfiles-update service
  ansible.builtin.template:
    src: dotfiles-update.service.j2
    dest: ~/.config/systemd/user/dotfiles-update.service
    mode: "0644"
  notify: Reload systemd user daemon

- name: Deploy dotfiles-update timer
  ansible.builtin.template:
    src: dotfiles-update.timer.j2
    dest: ~/.config/systemd/user/dotfiles-update.timer
    mode: "0644"
  notify: Reload systemd user daemon

- name: Enable and start dotfiles-update timer
  ansible.builtin.systemd:
    name: dotfiles-update.timer
    scope: user
    enabled: true
    state: started

- name: Deploy atuin daemon service
  ansible.builtin.copy:
    dest: ~/.config/systemd/user/atuin-daemon.service
    mode: "0644"
    content: |
      [Unit]
      Description=Atuin shell history sync daemon
      After=network.target

      [Service]
      ExecStart=/home/linuxbrew/.linuxbrew/bin/atuin daemon start --force
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=default.target
  notify: Reload systemd user daemon

- name: Enable and start atuin daemon
  ansible.builtin.systemd:
    name: atuin-daemon.service
    scope: user
    enabled: true
    state: started
