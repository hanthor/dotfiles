---
- name: Check if gh CLI exists
  ansible.builtin.stat:
    path: /home/linuxbrew/.linuxbrew/bin/gh
  register: gh_binary

- name: GitHub authentication and key registration
  when: gh_binary.stat.exists
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH }}"
    BW_SESSION: "{{ bw_session }}"
  block:
    # ── Authentication ──
    - name: Check gh auth status
      ansible.builtin.command: gh auth status
      register: gh_auth_status
      changed_when: false
      failed_when: false

    - name: Authenticate with GitHub via Bitwarden token
      when: gh_auth_status.rc != 0
      block:
        - name: Fetch GitHub token from Bitwarden
          ansible.builtin.command: bw get password github-token
          register: gh_token
          changed_when: false
          no_log: true

        - name: Login to GitHub with token
          ansible.builtin.shell: echo "{{ gh_token.stdout }}" | gh auth login --with-token
          no_log: true

    - name: Set git protocol to SSH
      ansible.builtin.command: gh config set git_protocol ssh
      changed_when: false

    # ── SSH key registration ──
    - name: Read SSH public key
      ansible.builtin.slurp:
        src: "{{ ansible_env.HOME }}/.ssh/{{ inventory_hostname }}_id_ed25519.pub"
      register: ssh_pub_key_raw

    - name: Set SSH public key facts
      ansible.builtin.set_fact:
        ssh_pub_key_full: "{{ ssh_pub_key_raw.content | b64decode | trim }}"
        ssh_key_body: "{{ (ssh_pub_key_raw.content | b64decode).split()[1] }}"

    # ── Auth key ──
    - name: Check existing GitHub authentication keys
      ansible.builtin.shell: gh api user/keys --jq '.[].key'
      register: gh_existing_auth_keys
      changed_when: false
      failed_when: false

    - name: Register SSH authentication key with GitHub
      ansible.builtin.command: >
        gh api user/keys
        --method POST
        --field title="{{ inventory_hostname }}-auth-{{ ansible_date_time.date | replace('-', '') }}"
        --field key="{{ ssh_pub_key_full }}"
      when: ssh_key_body not in (gh_existing_auth_keys.stdout | default(''))

    # ── Signing key ──
    - name: Check existing GitHub signing keys
      ansible.builtin.shell: gh api user/ssh_signing_keys --jq '.[].key'
      register: gh_existing_signing_keys
      changed_when: false
      failed_when: false

    - name: Register SSH signing key with GitHub
      ansible.builtin.command: >
        gh api user/ssh_signing_keys
        --method POST
        --field title="{{ inventory_hostname }}-signing-{{ ansible_date_time.date | replace('-', '') }}"
        --field key="{{ ssh_pub_key_full }}"
      when: ssh_key_body not in (gh_existing_signing_keys.stdout | default(''))
