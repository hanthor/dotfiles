---
- name: Install system dependencies for hardware discovery
  ansible.builtin.package:
    name: dmidecode
    state: present
  become: true

- name: Install netbox-agent in virtualenv
  ansible.builtin.pip:
    name: netbox-agent
    state: present
    virtualenv: /opt/netbox-agent
    virtualenv_command: python3 -m venv
  become: true

- name: Create NetBox config directory
  ansible.builtin.file:
    path: /etc/netbox
    state: directory
    mode: "0750"
    owner: root
    group: root
  become: true

- name: Fetch NetBox API token from Bitwarden
  when:
    - netbox_api_token is not defined
    - bw_session | default('') | length > 0
  ansible.builtin.command: bw get password netbox-api-token
  register: _agent_api_token
  changed_when: false
  no_log: true
  environment:
    BW_SESSION: "{{ bw_session }}"
    PATH: "{{ ansible_env_path }}"

- name: Set API token fact
  ansible.builtin.set_fact:
    netbox_api_token: "{{ _agent_api_token.stdout }}"
  no_log: true
  when:
    - netbox_api_token is not defined
    - _agent_api_token.stdout is defined

- name: Deploy netbox-agent config
  ansible.builtin.template:
    src: netbox_agent.yml.j2
    dest: /etc/netbox/netbox_agent.yml
    mode: "0640"
    owner: root
    group: root
  become: true
  no_log: true
  notify: Restart netbox-agent timer

- name: Deploy netbox-agent systemd units
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/systemd/system/
    owner: root
    group: root
    mode: "0644"
  become: true
  loop:
    - netbox-agent.service
    - netbox-agent.timer
  notify: Reload systemd daemon

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start netbox-agent timer
  ansible.builtin.systemd:
    name: netbox-agent.timer
    state: started
    enabled: true
  become: true
