---
- name: Pull netbox-agent container image
  ansible.builtin.command:
    cmd: podman pull docker.io/python:3.12-slim
  changed_when: false
  become: true

- name: Create NetBox config directory
  ansible.builtin.file:
    path: /etc/netbox
    state: directory
    mode: "0750"
    owner: root
    group: root
  become: true

- name: Deploy datacenter site file
  ansible.builtin.copy:
    content: "{{ netbox_site_slug | default('home') }}\n"
    dest: /etc/netbox/datacenter
    mode: "0644"
    owner: root
    group: root
  become: true

- name: Fetch NetBox API token from Bitwarden
  when:
    - netbox_api_token is not defined
    - bw_session | default('') | length > 0
  ansible.builtin.command: bw get password netbox-api-token
  register: _agent_api_token
  changed_when: false
  no_log: true
  environment:
    BW_SESSION: "{{ bw_session }}"
    PATH: "{{ ansible_env_path }}"

- name: Set API token fact
  ansible.builtin.set_fact:
    netbox_api_token: "{{ _agent_api_token.stdout }}"
  no_log: true
  when:
    - netbox_api_token is not defined
    - _agent_api_token.stdout is defined

- name: Deploy netbox-agent config
  ansible.builtin.template:
    src: netbox_agent.yml.j2
    dest: /etc/netbox/netbox_agent.yml
    mode: "0640"
    owner: root
    group: root
  become: true
  no_log: true
  notify: Restart netbox-agent timer

- name: Deploy netbox-agent service unit
  ansible.builtin.template:
    src: netbox-agent.service.j2
    dest: /etc/systemd/system/netbox-agent.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd daemon

- name: Deploy netbox-agent timer unit
  ansible.builtin.copy:
    src: netbox-agent.timer
    dest: /etc/systemd/system/
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd daemon

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start netbox-agent timer
  ansible.builtin.systemd:
    name: netbox-agent.timer
    state: started
    enabled: true
  become: true
