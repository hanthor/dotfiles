---
- name: Ensure configuration directory exists
  ansible.builtin.file:
    path: "~/.config/containers/systemd"
    state: directory
    mode: "0755"

- name: Deploy n8n Quadlets
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "~/.config/containers/systemd/{{ item }}"
    mode: "0644"
  loop:
    - n8n.network
    - n8n-db-data.volume
    - n8n-data.volume
    - n8n-db.container
    - n8n-server.container
  register: n8n_quadlets

- name: Reload systemd to apply Quadlets
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  when: n8n_quadlets.changed

- name: Start n8n services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    scope: user
  loop:
    - n8n-db.service
    - n8n-server.service
