---
- name: Check if bw CLI exists
  ansible.builtin.stat:
    path: /home/linuxbrew/.linuxbrew/bin/bw
  register: bw_binary

- name: Resolve Bitwarden session
  when: bw_binary.stat.exists
  block:
    # 1. BW_SESSION passed in environment (preferred — set by 'just apply')
    - name: Use BW_SESSION from environment
      ansible.builtin.set_fact:
        bw_session: "{{ lookup('env', 'BW_SESSION') }}"
      when: lookup('env', 'BW_SESSION') | length > 0

    # 2. Cached session from previous run
    - name: Check for cached session file
      ansible.builtin.stat:
        path: /tmp/bw_session
      register: bw_session_file
      when: bw_session is not defined

    - name: Read cached session
      ansible.builtin.slurp:
        src: /tmp/bw_session
      register: bw_session_cached_raw
      when:
        - bw_session is not defined
        - bw_session_file.stat is defined
        - bw_session_file.stat.exists

    - name: Use cached session
      ansible.builtin.set_fact:
        bw_session: "{{ bw_session_cached_raw.content | b64decode | trim }}"
      when:
        - bw_session is not defined
        - bw_session_cached_raw.content is defined

    # 3. Sync vault to ensure latest items are available
    - name: Sync Bitwarden vault
      ansible.builtin.command: bw sync
      changed_when: false
      failed_when: false
      when: bw_session is defined
      environment:
        BW_SESSION: "{{ bw_session }}"
        PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH }}"

    # 4. Cache session for reuse
    - name: Cache session to /tmp/bw_session
      ansible.builtin.copy:
        content: "{{ bw_session }}"
        dest: /tmp/bw_session
        mode: "0600"
      when: bw_session is defined

    - name: Warn if no Bitwarden session found
      ansible.builtin.debug:
        msg: >
          No BW_SESSION found. Run: export BW_SESSION=$(bw unlock --raw)
          then re-run 'just apply'. Skipping secrets.
      when: bw_session is not defined
