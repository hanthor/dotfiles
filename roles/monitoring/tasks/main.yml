---
- name: Create monitoring config directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring"
    state: directory
    mode: "0755"

- name: Create monitoring quadlets directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd"
    state: directory
    mode: "0755"

# Clone homelab-monitoring repo (holds quadlets, dashboards, Alloy config)
- name: Clone homelab-monitoring repo
  ansible.builtin.git:
    repo: https://github.com/hanthor/homelab-monitoring.git
    dest: "{{ ansible_facts['env']['HOME'] }}/dev/homelab-monitoring"
    version: main
    update: false
    force: false
  register: monitoring_repo

# Add user to systemd-journal group for Alloy journal access
- name: Add user to systemd-journal group
  ansible.builtin.user:
    name: "{{ ansible_facts['env']['USER'] }}"
    groups: systemd-journal
    append: true
  become: true

# Common quadlets (all non-VPS hosts)
- name: Deploy monitoring network
  ansible.builtin.copy:
    src: monitoring.network
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/monitoring.network"
    mode: "0644"
  notify: Reload systemd daemon

- name: Deploy node-exporter quadlet
  ansible.builtin.copy:
    src: node-exporter.container
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/node-exporter.container"
    mode: "0644"
  notify: Reload systemd daemon

- name: Deploy podman-exporter quadlet
  ansible.builtin.copy:
    src: podman-exporter.container
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/podman-exporter.container"
    mode: "0644"
  notify: Reload systemd daemon

# Alloy: all machines ship logs to Loki on the hub
# (Replaces Promtail — Alloy has native systemd journal support in its Docker image)
- name: Deploy alloy quadlet
  ansible.builtin.copy:
    src: alloy.container
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/alloy.container"
    mode: "0644"
  notify: Reload systemd daemon

- name: Deploy alloy data volume
  ansible.builtin.copy:
    src: alloy-data.volume
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/alloy-data.volume"
    mode: "0644"
  notify: Reload systemd daemon

- name: Deploy alloy config
  ansible.builtin.template:
    src: alloy.alloy.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/dev/homelab-monitoring/alloy.alloy"
    mode: "0644"
  notify: Restart alloy

- name: Remove old promtail quadlet
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/promtail.container"
    state: absent
  notify: Reload systemd daemon

# Prometheus: desktops and servers (hub and spokes)
- name: Deploy prometheus data volume
  ansible.builtin.copy:
    src: prometheus-data.volume
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/prometheus-data.volume"
    mode: "0644"
  when: is_desktop | bool or inventory_hostname in groups.get('server', [])
  notify: Reload systemd daemon

- name: Deploy prometheus quadlet (hub)
  ansible.builtin.copy:
    src: prometheus-hub.container
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/prometheus.container"
    mode: "0644"
  when: monitoring_hub | default(false) | bool
  notify: Reload systemd daemon

- name: Deploy prometheus quadlet (spoke)
  ansible.builtin.copy:
    src: prometheus.container
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/prometheus.container"
    mode: "0644"
  when:
    - not (monitoring_hub | default(false) | bool)
    - is_desktop | bool or inventory_hostname in groups.get('server', [])
  notify: Reload systemd daemon

- name: Deploy prometheus.yml config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/prometheus.yml"
    mode: "0644"
  when: is_desktop | bool or inventory_hostname in groups.get('server', [])
  notify: Restart prometheus

# Hub-only: Grafana, Loki, Alertmanager, PVE-exporter, Matrix-notifier
- name: Deploy hub volumes
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/{{ item }}"
    mode: "0644"
  loop:
    - grafana-data.volume
    - loki-data.volume
    - alertmanager-data.volume
  when: monitoring_hub | default(false) | bool
  notify: Reload systemd daemon

- name: Deploy hub quadlets
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/containers/systemd/{{ item }}"
    mode: "0644"
  loop:
    - grafana.container
    - loki.container
    - alertmanager.container
    - pve-exporter.container
    - matrix-notifier.container
  when: monitoring_hub | default(false) | bool
  notify:
    - Reload systemd daemon
    - Restart grafana

- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/grafana/provisioning/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - datasources
    - dashboards
  when: monitoring_hub | default(false) | bool

# Grafana provisioning (datasources, dashboards) lives in the homelab-monitoring
# repo at ~/dev/homelab-monitoring/grafana/provisioning — mounted by grafana.container.
# No separate template deployment needed.

- name: Deploy Loki config
  ansible.builtin.template:
    src: loki.yml.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/loki.yml"
    mode: "0644"
  when: monitoring_hub | default(false) | bool
  notify: Restart loki

- name: Create alerts config directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/alerts"
    state: directory
    mode: "0755"
  when: monitoring_hub | default(false) | bool

- name: Deploy alert rules
  ansible.builtin.copy:
    src: "alerts/{{ item }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/alerts/{{ item }}"
    mode: "0644"
  loop:
    - disk.yml
    - services.yml
  when: monitoring_hub | default(false) | bool
  notify: Restart prometheus

- name: Deploy matrix-notifier script
  ansible.builtin.copy:
    src: matrix-notifier.py
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/matrix-notifier.py"
    mode: "0755"
  when: monitoring_hub | default(false) | bool

# Hub secrets from Bitwarden
- name: Fetch pve-exporter credentials from Bitwarden
  ansible.builtin.command: bw get item pve-exporter --session {{ bw_session }}
  register: pve_bw_item
  changed_when: false
  no_log: true
  failed_when: false
  when: monitoring_hub | default(false) | bool

- name: Parse pve-exporter credentials
  ansible.builtin.set_fact:
    pve_token_value: "{{ (pve_bw_item.stdout | from_json).login.password }}"
  no_log: true
  when:
    - monitoring_hub | default(false) | bool
    - (pve_bw_item.stdout | default('')) | length > 0

- name: Deploy pve.yml config
  ansible.builtin.template:
    src: pve.yml.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/pve.yml"
    mode: "0644"
  no_log: true
  when:
    - monitoring_hub | default(false) | bool
    - pve_token_value is defined
  notify: Restart pve-exporter

- name: Fetch matrix-alertbot credentials from Bitwarden
  ansible.builtin.command: bw get item matrix-alertbot --session {{ bw_session }}
  register: matrix_bw_item
  changed_when: false
  no_log: true
  failed_when: false
  when: monitoring_hub | default(false) | bool

- name: Parse matrix-alertbot credentials
  ansible.builtin.set_fact:
    matrix_access_token: "{{ (matrix_bw_item.stdout | from_json).login.password }}"
    matrix_room_id: "{{ (matrix_bw_item.stdout | from_json).fields | selectattr('name', 'eq', 'room_id') | map(attribute='value') | first }}"
    matrix_homeserver_url: "{{ (matrix_bw_item.stdout | from_json).fields | selectattr('name', 'eq', 'homeserver_url') | map(attribute='value') | first }}"
  no_log: true
  when:
    - monitoring_hub | default(false) | bool
    - (matrix_bw_item.stdout | default('')) | length > 0

- name: Deploy alertmanager.yml config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/alertmanager.yml"
    mode: "0644"
  no_log: true
  when:
    - monitoring_hub | default(false) | bool
    - matrix_access_token is defined
  notify: Restart alertmanager

- name: Deploy matrix-notifier.env config
  ansible.builtin.template:
    src: matrix-notifier.env.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/monitoring/matrix-notifier.env"
    mode: "0600"
  no_log: true
  when:
    - monitoring_hub | default(false) | bool
    - matrix_access_token is defined
  notify: Restart matrix-notifier

# Enable and start services
- name: Enable and start node-exporter
  ansible.builtin.systemd:
    name: node-exporter.service
    state: started
    enabled: true
    scope: user
    daemon_reload: true

- name: Enable podman socket (required by podman-exporter)
  ansible.builtin.systemd:
    name: podman.socket
    state: started
    enabled: true
    scope: user

- name: Enable and start podman-exporter
  ansible.builtin.systemd:
    name: podman-exporter.service
    state: started
    enabled: true
    scope: user

- name: Enable and start alloy
  ansible.builtin.systemd:
    name: alloy.service
    state: started
    enabled: true
    scope: user

- name: Enable and start prometheus
  ansible.builtin.systemd:
    name: prometheus.service
    state: started
    enabled: true
    scope: user
  when: is_desktop | bool or (monitoring_hub | default(false) | bool)

- name: Enable and start hub services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    scope: user
  loop:
    - grafana.service
    - loki.service
    - alertmanager.service
  when: monitoring_hub | default(false) | bool

- name: Enable and start pve-exporter
  ansible.builtin.systemd:
    name: pve-exporter.service
    state: started
    enabled: true
    scope: user
  when:
    - monitoring_hub | default(false) | bool
    - pve_token_value is defined

- name: Disable matrix-notifier when credentials not configured
  ansible.builtin.command: systemctl --user disable --now matrix-notifier.service
  when:
    - monitoring_hub | default(false) | bool
    - matrix_access_token is not defined
  changed_when: false
  failed_when: false

- name: Enable and start matrix-notifier
  ansible.builtin.systemd:
    name: matrix-notifier.service
    state: started
    enabled: true
    scope: user
  when:
    - monitoring_hub | default(false) | bool
    - matrix_access_token is defined
