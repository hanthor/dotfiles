---
# ── GNOME Keybindings ─────────────────────────────────────────────
- name: Ensure dconf config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/dconf"
    state: directory
    mode: "0755"

- name: Copy GNOME keybindings file
  ansible.builtin.copy:
    src: gnome-keybindings.ini
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/dconf/gnome-keybindings.ini"
    mode: "0644"
  notify: Load GNOME keybindings

# ── Ptyxis: default profile → brew fish ──────────────────────────
- name: Get Ptyxis default profile UUID
  ansible.builtin.command: gsettings get org.gnome.Ptyxis default-profile-uuid
  register: ptyxis_uuid
  changed_when: false
  failed_when: false
  when: is_desktop | bool

- name: Set Ptyxis default profile to use brew fish and Nerd Font
  ansible.builtin.shell: |
    UUID=$(gsettings get org.gnome.Ptyxis default-profile-uuid | tr -d "'")
    CURRENT_CMD=$(gsettings get "org.gnome.Ptyxis.Profile:/org/gnome/ptyxis/profiles/${UUID}/" custom-command 2>/dev/null | tr -d "'")
    CURRENT_FONT=$(gsettings get org.gnome.Ptyxis font-name 2>/dev/null | tr -d "'")
    if [ "$CURRENT_CMD" != "/home/linuxbrew/.linuxbrew/bin/fish" ] || [ "$CURRENT_FONT" != "JetBrainsMono Nerd Font 12" ]; then
      gsettings set "org.gnome.Ptyxis.Profile:/org/gnome/ptyxis/profiles/${UUID}/" use-custom-command true
      gsettings set "org.gnome.Ptyxis.Profile:/org/gnome/ptyxis/profiles/${UUID}/" custom-command '/home/linuxbrew/.linuxbrew/bin/fish'
      gsettings set org.gnome.Ptyxis use-system-font false
      gsettings set org.gnome.Ptyxis font-name 'JetBrainsMono Nerd Font 12'
      echo changed
    fi
  register: ptyxis_set
  when: is_desktop | bool and ptyxis_uuid.rc is defined and ptyxis_uuid.rc == 0
  changed_when: "'changed' in ptyxis_set.stdout"
  ignore_errors: true

# ── User avatar ───────────────────────────────────────────────────
- name: Download user avatar from reilly.asia
  ansible.builtin.get_url:
    url: https://reilly.asia/profile.png
    dest: /var/lib/AccountsService/icons/james
    mode: "0644"
    force: true
  become: true
  when: is_desktop | bool

- name: Check if gdm user exists
  ansible.builtin.getent:
    database: passwd
    key: gdm
  register: gdm_user
  failed_when: false
  become: true
  when: is_desktop | bool

- name: Copy avatar to GDM cache directory
  ansible.builtin.copy:
    src: /var/lib/AccountsService/icons/james
    dest: /var/lib/gdm3/.cache/
    mode: "0644"
    force: true
  become: true
  when:
    - is_desktop | bool
    - gdm_user.ansible_facts is defined

- name: Set avatar ownership for GDM
  ansible.builtin.file:
    path: /var/lib/gdm3/.cache/james
    owner: gdm
    group: gdm
    mode: "0644"
  become: true
  when:
    - is_desktop | bool
    - gdm_user.ansible_facts is defined

- name: Set user avatar in AccountsService
  community.general.ini_file:
    path: /var/lib/AccountsService/users/james
    section: User
    option: Icon
    value: /var/lib/AccountsService/icons/james
    mode: "0644"
    create: true
  become: true
  when: is_desktop | bool

# ── GNOME Extensions — omnidirectional sync ───────────────────────
# User extensions: copied from repo; system extensions: RPM-managed (Bluefin)

- name: Ensure user GNOME extensions directory exists
  ansible.builtin.file:
    path: ~/.local/share/gnome-shell/extensions
    state: directory
    mode: "0755"
  when: is_desktop | bool

- name: Deploy user GNOME extensions
  ansible.builtin.copy:
    src: "extensions/{{ item }}/"
    dest: ~/.local/share/gnome-shell/extensions/{{ item }}/
    mode: "0644"
    directory_mode: "0755"
  loop:
    - copyous@boerdereinar.dev
    - papershell@lalovene.github.com
    - paperwm@paperwm.github.com
  when: is_desktop | bool

- name: Load GNOME extension settings via dconf
  ansible.builtin.shell: |
    dconf load /org/gnome/shell/extensions/ < {{ role_path }}/files/gnome-extensions-dconf.dump
  changed_when: false
  failed_when: false
  when: is_desktop | bool
  register: dconf_load

- name: Warn if dconf load failed (no D-Bus session?)
  ansible.builtin.debug:
    msg: >-
      dconf load for GNOME extensions failed (rc={{ dconf_load.rc }}).
      This is normal if SSH'd without a D-Bus session.
      Extension settings will apply on next login.
  when:
    - is_desktop | bool
    - dconf_load.rc | default(0) != 0

- name: Set enabled GNOME extensions
  community.general.dconf:
    key: /org/gnome/shell/enabled-extensions
    value: "{{ gnome_enabled_extensions }}"
    state: present
  when: is_desktop | bool
  failed_when: false

# ── GNOME Remote Desktop (RDP) ────────────────────────────────────
- name: Enable GNOME RDP protocol
  ansible.builtin.shell: |
    if ! grdctl rdp status 2>/dev/null | grep -q "Status: enabled"; then
      grdctl rdp enable && echo changed
    fi
  register: grdctl_enable
  changed_when: "'changed' in grdctl_enable.stdout"
  ignore_errors: true
  when: is_desktop | bool

- name: Enable GNOME Remote Desktop service
  ansible.builtin.systemd:
    name: gnome-remote-desktop.service
    state: started
    enabled: true
    scope: user
  when: is_desktop | bool
  ignore_errors: true
