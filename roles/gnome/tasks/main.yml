---
# ── GNOME Shell extensions ────────────────────────────────────────
- name: Configure GNOME extensions (disable tailscale ext, ensure appindicator enabled)
  ansible.builtin.shell: |
    python3 << 'EOF'
    import subprocess, ast, os
    os.environ['DBUS_SESSION_BUS_ADDRESS'] = f"unix:path=/run/user/{os.getuid()}/bus"
    result = subprocess.run(
        ['gsettings', 'get', 'org.gnome.shell', 'enabled-extensions'],
        capture_output=True, text=True)
    exts = ast.literal_eval(result.stdout.strip())
    exts = [e for e in exts if e != 'tailscale@joaophi.github.com']
    if 'appindicatorsupport@rgcjonas.gmail.com' not in exts:
        exts.insert(0, 'appindicatorsupport@rgcjonas.gmail.com')
    subprocess.run(['gsettings', 'set', 'org.gnome.shell', 'enabled-extensions', repr(exts)])
    EOF
  when: is_desktop | bool
  changed_when: false
  ignore_errors: true

- name: Ensure dconf config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/dconf"
    state: directory
    mode: "0755"

- name: Copy GNOME keybindings file
  ansible.builtin.copy:
    src: gnome-keybindings.ini
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/dconf/gnome-keybindings.ini"
    mode: "0644"
  notify: Load GNOME keybindings

# ── Ptyxis: default profile → brew fish ──────────────────────────
- name: Get Ptyxis default profile UUID
  ansible.builtin.command: gsettings get org.gnome.Ptyxis default-profile-uuid
  register: ptyxis_uuid
  changed_when: false
  failed_when: false
  when: is_desktop | bool

- name: Set Ptyxis default profile to use brew fish and Nerd Font
  ansible.builtin.shell: |
    UUID=$(gsettings get org.gnome.Ptyxis default-profile-uuid | tr -d "'")
    gsettings set "org.gnome.Ptyxis.Profile:/org/gnome/ptyxis/profiles/${UUID}/" use-custom-command true
    gsettings set "org.gnome.Ptyxis.Profile:/org/gnome/ptyxis/profiles/${UUID}/" custom-command '/home/linuxbrew/.linuxbrew/bin/fish'
    gsettings set org.gnome.Ptyxis use-system-font false
    gsettings set org.gnome.Ptyxis font-name 'JetBrainsMono Nerd Font 12'
  when: is_desktop | bool and ptyxis_uuid.rc is defined and ptyxis_uuid.rc == 0
  changed_when: true
  ignore_errors: true

# ── User avatar ───────────────────────────────────────────────────
- name: Download user avatar from reilly.asia
  ansible.builtin.get_url:
    url: https://reilly.asia/profile.png
    dest: /var/lib/AccountsService/icons/james
    mode: "0644"
    force: true
  become: true
  when: is_desktop | bool

- name: Check if gdm user exists
  ansible.builtin.getent:
    database: passwd
    key: gdm
  register: gdm_user
  failed_when: false
  become: true
  when: is_desktop | bool

- name: Copy avatar to GDM cache directory
  ansible.builtin.copy:
    src: /var/lib/AccountsService/icons/james
    dest: /var/lib/gdm3/.cache/
    mode: "0644"
    force: true
  become: true
  when:
    - is_desktop | bool
    - gdm_user.ansible_facts is defined

- name: Set avatar ownership for GDM
  ansible.builtin.file:
    path: /var/lib/gdm3/.cache/james
    owner: gdm
    group: gdm
    mode: "0644"
  become: true
  when:
    - is_desktop | bool
    - gdm_user.ansible_facts is defined

- name: Set user avatar in AccountsService
  community.general.ini_file:
    path: /var/lib/AccountsService/users/james
    section: User
    option: Icon
    value: /var/lib/AccountsService/icons/james
    mode: "0644"
    create: true
  become: true
  when: is_desktop | bool

# ── GNOME Remote Desktop (RDP) ────────────────────────────────────
- name: Enable GNOME RDP protocol
  ansible.builtin.command: grdctl rdp enable
  changed_when: true
  ignore_errors: true
  when: is_desktop | bool

- name: Enable GNOME Remote Desktop service
  ansible.builtin.systemd:
    name: gnome-remote-desktop.service
    state: started
    enabled: true
    scope: user
  when: is_desktop | bool
  ignore_errors: true
