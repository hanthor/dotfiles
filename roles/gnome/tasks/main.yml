---
- name: Ensure dconf config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/dconf"
    state: directory
    mode: "0755"

- name: Copy GNOME keybindings file
  ansible.builtin.copy:
    src: gnome-keybindings.ini
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/dconf/gnome-keybindings.ini"
    mode: "0644"
  notify: Load GNOME keybindings

# ── Ptyxis: default profile → brew fish ──────────────────────────
- name: Get Ptyxis default profile UUID
  ansible.builtin.command: gsettings get org.gnome.Ptyxis default-profile-uuid
  register: ptyxis_uuid
  changed_when: false
  failed_when: false
  when: is_desktop | bool

- name: Set Ptyxis default profile to use brew fish and Nerd Font
  ansible.builtin.shell: |
    UUID=$(gsettings get org.gnome.Ptyxis default-profile-uuid | tr -d "'")
    gsettings set "org.gnome.Ptyxis.Profile:/org/gnome/ptyxis/profiles/${UUID}/" use-custom-command true
    gsettings set "org.gnome.Ptyxis.Profile:/org/gnome/ptyxis/profiles/${UUID}/" custom-command '/home/linuxbrew/.linuxbrew/bin/fish'
    gsettings set org.gnome.Ptyxis use-system-font false
    gsettings set org.gnome.Ptyxis font-name 'JetBrainsMono Nerd Font 12'
  when: is_desktop | bool and ptyxis_uuid.rc is defined and ptyxis_uuid.rc == 0
  changed_when: true
  ignore_errors: true

# ── User avatar ───────────────────────────────────────────────────
- name: Download user avatar from reilly.asia
  ansible.builtin.get_url:
    url: https://reilly.asia/profile.png
    dest: /var/lib/AccountsService/icons/james
    mode: "0644"
    force: true
  become: true
  when: is_desktop | bool

- name: Copy avatar to GDM cache directory
  ansible.builtin.copy:
    src: /var/lib/AccountsService/icons/james
    dest: /var/lib/gdm3/.cache/
    mode: "0644"
    force: true
  become: true
  when: is_desktop | bool

- name: Set avatar ownership for GDM
  ansible.builtin.file:
    path: /var/lib/gdm3/.cache/james
    owner: gdm
    group: gdm
    mode: "0644"
  become: true
  when: is_desktop | bool

- name: Set user avatar in AccountsService
  community.general.ini_file:
    path: /var/lib/AccountsService/users/james
    section: User
    option: Icon
    value: /var/lib/AccountsService/icons/james
    mode: "0644"
    create: true
  become: true
  when: is_desktop | bool
