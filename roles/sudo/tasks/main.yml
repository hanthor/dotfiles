---
- name: Ensure passwordless sudo for current user
  ansible.builtin.copy:
    content: "{{ ansible_user_id | default(lookup('env', 'USER')) }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ ansible_user_id | default(lookup('env', 'USER')) }}"
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  become: true
