---
# DNS + sysctl pre-connection setup. Runs on every machine, connected or not.
# Ensures systemd-resolved is configured for Tailscale MagicDNS and rp_filter
# is set for exit node compatibility.

- name: Create systemd-resolved drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"
  become: true

- name: Configure systemd-resolved to listen on [::1] for container DNS
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/ipv6-stub.conf
    mode: "0644"
    content: |
      [Resolve]
      DNSStubListenerExtra=::1
  become: true
  notify: Restart systemd-resolved

- name: Point resolv.conf to systemd-resolved stub resolver
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
    follow: false
  become: true
  notify: Restart systemd-resolved
  when: not (tailscale_accept_dns is defined and not tailscale_accept_dns)

# rp_filter=2 (loose mode) is required for exit node traffic to route correctly.
- name: Configure sysctl for Tailscale exit node compatibility
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-tailscale.conf
    mode: "0644"
    content: |
      net.ipv4.conf.all.rp_filter = 2
      net.ipv4.conf.default.rp_filter = 2
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1
  become: true
  notify: Apply sysctl settings
