---
# ── Phase 1: Network prerequisites (always, before connection check) ──
- name: Configure DNS and sysctl prerequisites
  ansible.builtin.include_tasks: configure_prereqs.yml

# ── Phase 2: Check connection state ──
- name: Check if tailscale is already connected
  ansible.builtin.command: tailscale status
  register: _ts_status
  changed_when: false
  failed_when: false

# ── Phase 3a: Already connected — configure routes, hostname, desktop extras ──
- name: Configure connected Tailscale
  ansible.builtin.include_tasks: configure_connected.yml
  when: _ts_status.rc == 0

# ── Phase 3b: Not connected — install, fetch auth, join ──
- name: End role if already connected
  ansible.builtin.meta: end_role
  when: _ts_status.rc == 0

- name: Install Tailscale
  ansible.builtin.include_tasks: install.yml

- name: Join tailnet
  ansible.builtin.include_tasks: connect.yml
