---
# Configure systemd-resolved to work properly with Tailscale MagicDNS.
# resolv.conf must point to the stub resolver so Tailscale can configure
# resolved via D-Bus instead of overwriting the file directly.
- name: Create systemd-resolved drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"
  become: true

- name: Configure systemd-resolved to listen on [::1] for container DNS
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/ipv6-stub.conf
    mode: "0644"
    content: |
      [Resolve]
      DNSStubListenerExtra=::1
  become: true
  notify: Restart systemd-resolved

- name: Point resolv.conf to systemd-resolved stub resolver
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  become: true
  notify: Restart systemd-resolved

# rp_filter=2 (loose mode) is required for exit node traffic to route correctly.
# Tailscale v1.96+ sets this automatically, but net.ipv4.conf.default.rp_filter
# defaults to 1 (strict) and applies to new interfaces, so set both explicitly.
- name: Configure sysctl for Tailscale exit node compatibility
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-tailscale.conf
    mode: "0644"
    content: |
      net.ipv4.conf.all.rp_filter = 2
      net.ipv4.conf.default.rp_filter = 2
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1
  become: true
  notify: Apply sysctl settings

- name: Check if tailscale is already connected
  ansible.builtin.command: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Advertise subnet routes (idempotent, runs even when already connected)
  ansible.builtin.command: >
    tailscale up
    --advertise-routes={{ tailscale_advertise_routes }}
    {% if tailscale_accept_dns is defined and not tailscale_accept_dns %}--accept-dns=false{% endif %}
    {% if tailscale_operator is defined %}--operator={{ tailscale_operator }}{% endif %}

  become: true
  when:
    - tailscale_status.rc == 0
    - tailscale_advertise_routes is defined
  changed_when: true

- name: Fix resolv.conf when systemd-resolved is not active
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: "nameserver 1.1.1.1\nnameserver 8.8.8.8\n"
    owner: root
    group: root
    mode: "0644"
    force: true
  become: true
  when:
    - tailscale_status.rc == 0
    - tailscale_accept_dns is defined
    - not tailscale_accept_dns

- name: Skip if already connected
  ansible.builtin.meta: end_role
  when: tailscale_status.rc == 0

- name: Check if tailscale command exists
  ansible.builtin.command: which tailscale
  register: tailscale_exists
  changed_when: false
  failed_when: false

- name: Check if ujust exists
  ansible.builtin.command: which ujust
  register: ujust_exists
  changed_when: false
  failed_when: false
  when: tailscale_exists.rc != 0

- name: Install tailscale via ujust
  ansible.builtin.command: ujust install-tailscale
  when:
    - tailscale_exists.rc != 0
    - ujust_exists.rc == 0

- name: Install tailscale via install script
  ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
  become: true
  when:
    - tailscale_exists.rc != 0
    - ujust_exists.rc != 0

- name: Fetch tailscale auth key from Bitwarden
  ansible.builtin.shell: BW_SESSION={{ bw_session }} bw get password tailscale-authkey
  register: tailscale_authkey
  changed_when: false
  no_log: true
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH }}"

- name: Join tailscale network
  ansible.builtin.command: tailscale up --authkey {{ tailscale_authkey.stdout }} --hostname {{ inventory_hostname }}
  become: true
  no_log: true

- name: Advertise subnet routes
  ansible.builtin.command: >
    tailscale up --advertise-routes={{ tailscale_advertise_routes }}
    --reset=false
  become: true
  when: tailscale_advertise_routes is defined
  changed_when: true
