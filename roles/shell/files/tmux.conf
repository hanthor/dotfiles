# ── Terminal & color ─────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm*:Tc,alacritty*:Tc,foot*:Tc"
set -as terminal-features ",*:clipboard"   # OSC52 clipboard (works over SSH)
set -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u

# ── Shell ────────────────────────────────────────────────────────
set-option -g default-shell /home/linuxbrew/.linuxbrew/bin/fish

# ── General ──────────────────────────────────────────────────────
set -g mouse on
set -sg escape-time 10          # eliminate nvim ESC delay
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S:#W"

# ── Prefix ───────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── Pane navigation (vim-style) ──────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Split with same path ─────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Resize panes ─────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Sync panes ───────────────────────────────────────────────────
bind s setw synchronize-panes

# ── Reload config ────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ── Copy mode ────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || wl-copy 2>/dev/null || pbcopy 2>/dev/null || true"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || wl-copy 2>/dev/null || pbcopy 2>/dev/null || true"
# Middle-click to paste
bind -n MouseDown2Pane run "tmux set-buffer -- \"$(xclip -selection clipboard -o 2>/dev/null || wl-paste 2>/dev/null || pbpaste 2>/dev/null || true)\"; tmux paste-buffer -p"

# ── Catppuccin Mocha statusbar ───────────────────────────────────
set -g status-position bottom
set -g status on
set -g status-interval 5
set -g status-bg "#1e1e2e"
set -g status-fg "#cdd6f4"
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 120

set -g message-style "fg=#1e1e2e,bg=#f5c2e7,bold"
set -g message-command-style "fg=#1e1e2e,bg=#f5c2e7"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#f5c2e7"

setw -g window-status-activity-style "fg=#f5c2e7,bg=#1e1e2e,none"
setw -g window-status-separator ""
setw -g window-status-style "fg=#6c7086,bg=#1e1e2e,none"
setw -g window-status-current-style "fg=#f5c2e7,bg=#313244,bold"

set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=#1e1e2e,nobold]"
set -g status-right "#[fg=#45475a,bg=#1e1e2e]#[fg=#cdd6f4,bg=#45475a] %H:%M #[fg=#585b70,bg=#45475a]#[fg=#cdd6f4,bg=#585b70] #H "

setw -g window-status-format "#[fg=#6c7086,bg=#1e1e2e]  #I #W  "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold]  #I #W  "

setw -g mode-style "fg=#f5c2e7,bg=#313244,bold"
