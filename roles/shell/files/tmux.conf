# Default shell
set-option -g default-shell /home/linuxbrew/.linuxbrew/bin/fish

# Catppuccin Mocha colors for tmux — solid pink bar
set -g status-position bottom
set -g status "on"
set -g status-bg "#f5c2e7"
set -g status-fg "#1e1e2e"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# messages
set -g message-style fg="#1e1e2e",bg="#f5c2e7",align="centre"
set -g message-command-style fg="#1e1e2e",bg="#f5c2e7",align="centre"

# panes
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#f5c2e7"

# windows
setw -g window-status-activity-style fg="#1e1e2e",bg="#f5c2e7",none
setw -g window-status-separator ""
setw -g window-status-style fg="#1e1e2e",bg="#f5c2e7",none

# --------=== Statusline ===-------
set -g status-left ""
set -g status-right "#[fg=#1e1e2e,bg=#f5c2e7,bold] #W | #H "

setw -g window-status-format "#[fg=#1e1e2e,bg=#f5c2e7] #I #W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#f5c2e7,bold] #I #W "

# modes
setw -g mode-style fg="#f5c2e7",bg="#1e1e2e",bold

# Original settings
set -g mouse on
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind s setw synchronize-panes
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Copy mode
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || wl-copy 2>/dev/null || pbcopy 2>/dev/null || true"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || wl-copy 2>/dev/null || pbcopy 2>/dev/null || true"
# Middle-click to paste
bind -n MouseDown2Pane run "tmux set-buffer -- \"$(xclip -selection clipboard -o 2>/dev/null || wl-paste 2>/dev/null || pbpaste 2>/dev/null || true)\"; tmux paste-buffer -p"
