---
# ── Fonts ────────────────────────────────────────────────────────
- name: Ensure font directory exists
  ansible.builtin.file:
    path: ~/.local/share/fonts
    state: directory
    mode: "0755"

- name: Check if JetBrains Mono Nerd Font is installed
  ansible.builtin.stat:
    path: ~/.local/share/fonts/JetBrainsMono/JetBrainsMonoNerdFont-Regular.ttf
  register: jb_font

- name: Install JetBrains Mono Nerd Font
  when: not jb_font.stat.exists and is_desktop | bool
  block:
    - name: Download JetBrains Mono Nerd Font
      ansible.builtin.get_url:
        url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
        dest: /tmp/JetBrainsMono.zip
        mode: "0644"

    - name: Create JetBrainsMono font directory
      ansible.builtin.file:
        path: ~/.local/share/fonts/JetBrainsMono
        state: directory
        mode: "0755"

    - name: Unarchive JetBrains Mono Nerd Font
      ansible.builtin.unarchive:
        src: /tmp/JetBrainsMono.zip
        dest: ~/.local/share/fonts/JetBrainsMono
        remote_src: true

    - name: Update font cache
      ansible.builtin.command: fc-cache -f
      changed_when: false

- name: Create ~/.config/shell/ directory
  ansible.builtin.file:
    path: ~/.config/shell
    state: directory
    mode: "0755"

- name: Deploy shared aliases (bash/zsh)
  ansible.builtin.template:
    src: aliases.sh.j2
    dest: ~/.config/shell/aliases.sh
    mode: "0644"

- name: Deploy ~/.bashrc
  ansible.builtin.template:
    src: bashrc.j2
    dest: ~/.bashrc
    mode: "0644"

- name: Deploy ~/.zshrc
  ansible.builtin.template:
    src: zshrc.j2
    dest: ~/.zshrc
    mode: "0644"

- name: Deploy ~/.zprofile
  ansible.builtin.template:
    src: zprofile.j2
    dest: ~/.zprofile
    mode: "0644"

- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: "0700"

- name: Deploy SSH config
  ansible.builtin.template:
    src: ../../ssh_keys/templates/ssh_config.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.ssh/config"
    mode: "0644"

- name: Deploy ~/.tmux.conf
  ansible.builtin.copy:
    src: tmux.conf
    dest: ~/.tmux.conf
    mode: "0644"

- name: Deploy ~/.inputrc (readline defaults for bash + readline apps)
  ansible.builtin.copy:
    src: inputrc
    dest: ~/.inputrc
    mode: "0644"

- name: Ensure ~/.config/starship directory exists
  ansible.builtin.file:
    path: ~/.config
    state: directory
    mode: "0755"

- name: Deploy starship.toml
  ansible.builtin.copy:
    src: starship.toml
    dest: ~/.config/starship.toml
    mode: "0644"

- name: Create ~/.config/fish/ directory
  ansible.builtin.file:
    path: ~/.config/fish
    state: directory
    mode: "0755"

- name: Create ~/.config/fish/conf.d/ directory
  ansible.builtin.file:
    path: ~/.config/fish/conf.d
    state: directory
    mode: "0755"

- name: Deploy ~/.config/fish/config.fish
  ansible.builtin.copy:
    src: config.fish
    dest: ~/.config/fish/config.fish
    mode: "0644"

- name: Deploy fish aliases
  ansible.builtin.copy:
    src: aliases.fish
    dest: ~/.config/fish/conf.d/aliases.fish
    mode: "0644"

# ── Atuin config ─────────────────────────────────────────────────
- name: Ensure atuin config dir exists
  ansible.builtin.file:
    path: ~/.config/atuin
    state: directory
    mode: "0755"

- name: Deploy atuin config
  ansible.builtin.copy:
    dest: ~/.config/atuin/config.toml
    mode: "0644"
    content: |
      sync_address = "https://api.atuin.sh"
      sync_frequency = "5m"
      auto_sync = true
      search_mode = "fuzzy"
      # both Ctrl-R and Up arrow use global search
      filter_mode = "global"
      filter_mode_shell_up_key_binding = "global"
      style = "compact"
      show_preview = true
      max_preview_height = 4

# ── Atuin setup from Bitwarden ────────────────────────────────────
- name: Ensure atuin data dir exists
  ansible.builtin.file:
    path: ~/.local/share/atuin
    state: directory
    mode: "0700"
  tags: [secrets]

# bw sync is handled by the bitwarden role earlier in the play — skip here.

# Skip BW round-trip when already logged in — atuin sync status is the source of truth.
- name: Check Atuin sync status
  ansible.builtin.command: atuin status
  register: atuin_status_cmd
  changed_when: false
  failed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [secrets]

- name: Set Atuin logged in fact
  ansible.builtin.set_fact:
    atuin_logged_in: "{{ atuin_status_cmd.rc == 0 and '[Sync]' in atuin_status_cmd.stdout }}"
  tags: [secrets]

- name: Check if atuin key exists
  ansible.builtin.stat:
    path: ~/.local/share/atuin/key
  register: atuin_existing_key
  tags: [secrets]

- name: Fetch atuin credentials from Bitwarden
  ansible.builtin.shell: |
    SESSION="${BW_SESSION:-$(cat /tmp/bw_session 2>/dev/null)}"
    [ -z "$SESSION" ] && exit 1
    bw get item "atuin.sh" --session "$SESSION"
  register: atuin_bw_item
  no_log: true
  changed_when: false
  failed_when: false
  when: not atuin_logged_in
  environment:
    BW_SESSION: "{{ bw_session | default('') }}"
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [secrets]

- name: Skip atuin login (already logged in)
  ansible.builtin.set_fact:
    atuin_bw_item: { rc: 1, stdout: "" }
  when: atuin_logged_in
  tags: [secrets]

- name: Warn if atuin.sh not found in Bitwarden
  ansible.builtin.debug:
    msg: >-
      Bitwarden item 'atuin.sh' not found or vault locked — skipping atuin login.
      Run 'bw unlock' on this machine and re-run, or log in to atuin manually.
  when:
    - not atuin_logged_in
    - atuin_bw_item.rc != 0 or (atuin_bw_item.stdout | default('')) | length == 0
  tags: [secrets]

- name: Parse atuin credentials
  ansible.builtin.set_fact:
    atuin_username: "{{ (atuin_bw_item.stdout | from_json).login.username }}"
    atuin_password: "{{ (atuin_bw_item.stdout | from_json).login.password }}"
    atuin_key: "{{ (atuin_bw_item.stdout | from_json).fields | selectattr('name', 'equalto', 'key') | map(attribute='value') | first }}"
  no_log: true
  when: atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default('')) | length > 0
  tags: [secrets]

# NOTE: We do NOT write atuin_key (mnemonic) to ~/.local/share/atuin/key directly.
# Atuin expects that file to be a base64-encoded binary key.
# Running 'atuin login -k' with the mnemonic correctly generates the binary key file.
- name: Remove atuin data directory before fresh login
  ansible.builtin.file:
    path: ~/.local/share/atuin
    state: absent
  when: >
    atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default("")) | length > 0
    and not atuin_existing_key.stat.exists
  tags: [secrets]

- name: Login to atuin sync
  ansible.builtin.command: >
    atuin login -u "{{ atuin_username }}" -p "{{ atuin_password }}" -k "{{ atuin_key }}"
  when: >
    atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default("")) | length > 0
    and not atuin_logged_in
  changed_when: true
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [secrets]

- name: Sync atuin history (best-effort — key mismatch is non-fatal)
  ansible.builtin.command: atuin sync
  changed_when: false
  failed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default("")) | length > 0
  tags: [shell, secrets]

- name: Check if shell history has already been imported into atuin
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/atuin/.history_imported"
  register: atuin_import_sentinel

- name: Import existing shell history into atuin
  ansible.builtin.shell: |
    atuin import auto 2>&1
    touch "{{ ansible_facts['env']['HOME'] }}/.local/share/atuin/.history_imported"
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: not atuin_import_sentinel.stat.exists
  changed_when: false
  failed_when: false
  tags: [shell]

# ── AI Coding Tools configuration ────────────────────────────────
- name: Create pi-coding-agent directory
  ansible.builtin.file:
    path: ~/.pi/agent
    state: directory
    mode: "0755"

- name: Deploy pi-coding-agent models config
  ansible.builtin.copy:
    src: pi-models.json
    dest: ~/.pi/agent/models.json
    mode: "0644"

# ── pi-coding-agent auth from Bitwarden ──────────────────────────
- name: Fetch DeepSeek API key from Bitwarden
  ansible.builtin.shell: |
    SESSION="${BW_SESSION:-$(cat /tmp/bw_session 2>/dev/null)}"
    [ -z "$SESSION" ] && exit 1
    bw get password "deepseek-api-key" --session "$SESSION"
  register: deepseek_key
  no_log: true
  changed_when: false
  failed_when: false
  environment:
    BW_SESSION: "{{ bw_session | default('') }}"
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Write pi-coding-agent auth.json
  ansible.builtin.copy:
    content: |
      {
        "deepseek": { "type": "api_key", "key": "{{ deepseek_key.stdout | trim }}" }
      }
    dest: ~/.pi/agent/auth.json
    mode: "0600"
  no_log: true
  when: deepseek_key.rc == 0 and deepseek_key.stdout | trim | length > 0

# ── Forgejo API token for MCP server ─────────────────────────────
- name: Fetch Forgejo API token from Bitwarden
  ansible.builtin.shell: |
    SESSION="${BW_SESSION:-$(cat /tmp/bw_session 2>/dev/null)}"
    [ -z "$SESSION" ] && exit 1
    bw get notes forgejo --session "$SESSION" | grep "API Token:" | sed 's/API Token: //'
  register: forgejo_token
  no_log: true
  changed_when: false
  failed_when: false
  environment:
    BW_SESSION: "{{ bw_session | default('') }}"
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Write shell secrets file
  ansible.builtin.copy:
    content: |
      # Managed by dotfiles playbook — DO NOT EDIT
      export FORGEJO_TOKEN={{ forgejo_token.stdout | trim }}
    dest: ~/.config/shell/secrets.sh
    mode: "0600"
  no_log: true
  when: forgejo_token.rc == 0 and forgejo_token.stdout | trim | length > 0

# ── tailvm shell completions ──────────────────────────────────────
- name: Deploy tailvm bash completion
  ansible.builtin.copy:
    src: tailvm-completion.bash
    dest: ~/.tailvm-completion.bash
    mode: "0644"

- name: Deploy tailvm zsh completion
  ansible.builtin.copy:
    src: tailvm-completion.zsh
    dest: ~/.tailvm-completion.zsh
    mode: "0644"

- name: Ensure fish completions directory exists
  ansible.builtin.file:
    path: ~/.config/fish/completions
    state: directory
    mode: "0755"

- name: Deploy tailvm fish completion
  ansible.builtin.copy:
    src: tailvm-completion.fish
    dest: ~/.config/fish/completions/tailvm.fish
    mode: "0644"

- name: Warn if deepseek-api-key not found in Bitwarden
  ansible.builtin.debug:
    msg: >-
      Bitwarden item 'deepseek-api-key' not found or vault locked — skipping pi auth config.
      Run: bw create item ... or seed it manually.
  when: deepseek_key.rc != 0 or deepseek_key.stdout | trim | length == 0


