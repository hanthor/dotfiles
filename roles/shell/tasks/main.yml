---
# ── Fonts ────────────────────────────────────────────────────────
- name: Ensure font directory exists
  ansible.builtin.file:
    path: ~/.local/share/fonts
    state: directory
    mode: "0755"

- name: Check if JetBrains Mono Nerd Font is installed
  ansible.builtin.stat:
    path: ~/.local/share/fonts/JetBrainsMono/JetBrainsMonoNerdFont-Regular.ttf
  register: jb_font

- name: Install JetBrains Mono Nerd Font
  when: not jb_font.stat.exists and is_desktop | bool
  block:
    - name: Download JetBrains Mono Nerd Font
      ansible.builtin.get_url:
        url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
        dest: /tmp/JetBrainsMono.zip
        mode: "0644"

    - name: Create JetBrainsMono font directory
      ansible.builtin.file:
        path: ~/.local/share/fonts/JetBrainsMono
        state: directory
        mode: "0755"

    - name: Unarchive JetBrains Mono Nerd Font
      ansible.builtin.unarchive:
        src: /tmp/JetBrainsMono.zip
        dest: ~/.local/share/fonts/JetBrainsMono
        remote_src: true

    - name: Update font cache
      ansible.builtin.command: fc-cache -f
      changed_when: true

- name: Create ~/.config/shell/ directory
  ansible.builtin.file:
    path: ~/.config/shell
    state: directory
    mode: "0755"

- name: Deploy shared aliases (bash/zsh)
  ansible.builtin.template:
    src: aliases.sh.j2
    dest: ~/.config/shell/aliases.sh
    mode: "0644"

- name: Deploy ~/.bashrc
  ansible.builtin.template:
    src: bashrc.j2
    dest: ~/.bashrc
    mode: "0644"

- name: Deploy ~/.zshrc
  ansible.builtin.template:
    src: zshrc.j2
    dest: ~/.zshrc
    mode: "0644"

- name: Deploy ~/.zprofile
  ansible.builtin.template:
    src: zprofile.j2
    dest: ~/.zprofile
    mode: "0644"

- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: "0700"

- name: Deploy SSH config
  ansible.builtin.template:
    src: ../../ssh_keys/templates/ssh_config.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.ssh/config"
    mode: "0644"

- name: Deploy ~/.tmux.conf
  ansible.builtin.copy:
    src: tmux.conf
    dest: ~/.tmux.conf
    mode: "0644"

- name: Create ~/.config/fish/ directory
  ansible.builtin.file:
    path: ~/.config/fish
    state: directory
    mode: "0755"

- name: Create ~/.config/fish/conf.d/ directory
  ansible.builtin.file:
    path: ~/.config/fish/conf.d
    state: directory
    mode: "0755"

- name: Deploy ~/.config/fish/config.fish
  ansible.builtin.copy:
    src: config.fish
    dest: ~/.config/fish/config.fish
    mode: "0644"

- name: Deploy fish aliases
  ansible.builtin.copy:
    src: aliases.fish
    dest: ~/.config/fish/conf.d/aliases.fish
    mode: "0644"

# ── Atuin config ─────────────────────────────────────────────────
- name: Ensure atuin config dir exists
  ansible.builtin.file:
    path: ~/.config/atuin
    state: directory
    mode: "0755"

- name: Deploy atuin config
  ansible.builtin.copy:
    dest: ~/.config/atuin/config.toml
    mode: "0644"
    content: |
      sync_address = "https://api.atuin.sh"
      sync_frequency = "5m"
      auto_sync = true
      search_mode = "fuzzy"
      filter_mode = "global"
      style = "compact"

# ── Atuin setup from Bitwarden ────────────────────────────────────
- name: Ensure atuin data dir exists
  ansible.builtin.file:
    path: ~/.local/share/atuin
    state: directory
    mode: "0700"
  tags: [secrets]

- name: Sync Bitwarden vault before secret fetch
  ansible.builtin.shell: |
    SESSION="${BW_SESSION:-$(cat /tmp/bw_session 2>/dev/null)}"
    [ -z "$SESSION" ] && exit 0
    bw sync --session "$SESSION"
  changed_when: false
  failed_when: false
  tags: [secrets]
  environment:
    BW_SESSION: "{{ bw_session | default('') }}"
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Fetch atuin credentials from Bitwarden
  ansible.builtin.shell: |
    SESSION="${BW_SESSION:-$(cat /tmp/bw_session 2>/dev/null)}"
    [ -z "$SESSION" ] && exit 1
    bw get item "atuin.sh" --session "$SESSION"
  register: atuin_bw_item
  no_log: true
  changed_when: false
  failed_when: false
  environment:
    BW_SESSION: "{{ bw_session | default('') }}"
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [secrets]

- name: Warn if atuin.sh not found in Bitwarden
  ansible.builtin.debug:
    msg: >-
      Bitwarden item 'atuin.sh' not found or vault locked — skipping atuin login.
      Run 'bw unlock' on this machine and re-run, or log in to atuin manually.
  when: atuin_bw_item.rc != 0 or (atuin_bw_item.stdout | default('')) | length == 0
  tags: [secrets]

- name: Parse atuin credentials
  ansible.builtin.set_fact:
    atuin_username: "{{ (atuin_bw_item.stdout | from_json).login.username }}"
    atuin_password: "{{ (atuin_bw_item.stdout | from_json).login.password }}"
    atuin_key: "{{ (atuin_bw_item.stdout | from_json).fields | selectattr('name', 'equalto', 'key') | map(attribute='value') | first }}"
  no_log: true
  when: atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default('')) | length > 0
  tags: [secrets]

# NOTE: We do NOT write atuin_key (mnemonic) to ~/.local/share/atuin/key directly.
# Atuin expects that file to be a base64-encoded binary key.
# Running 'atuin login -k' with the mnemonic correctly generates the binary key file.
- name: Check if atuin is already logged in
  ansible.builtin.stat:
    path: ~/.local/share/atuin/session
  register: atuin_session
  when: atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default("")) | length > 0
  tags: [secrets]

- name: Remove atuin data directory before fresh login
  ansible.builtin.file:
    path: ~/.local/share/atuin
    state: absent
  when: >
    atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default("")) | length > 0
    and not atuin_session.stat.exists
  tags: [secrets]

- name: Login to atuin sync
  ansible.builtin.command: >
    atuin login -u "{{ atuin_username }}" -p "{{ atuin_password }}" -k "{{ atuin_key }}"
  when: >
    atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default("")) | length > 0
    and not atuin_session.stat.exists
  changed_when: true
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  tags: [secrets]

- name: Sync atuin history (best-effort — key mismatch is non-fatal)
  ansible.builtin.command: atuin sync
  changed_when: true
  failed_when: false
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"
  when: atuin_bw_item.rc == 0 and (atuin_bw_item.stdout | default("")) | length > 0
  tags: [secrets]
