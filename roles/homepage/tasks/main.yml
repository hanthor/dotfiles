---
- name: Create homepage config directory
  ansible.builtin.file:
    path: /etc/homepage/config
    state: directory
    mode: "0777"
    owner: root
    group: root
  become: true

- name: Deploy homepage service config
  ansible.builtin.template:
    src: services.yaml.j2
    dest: /etc/homepage/config/services.yaml
    mode: "0644"
    owner: root
    group: root
  become: true

- name: Deploy homepage widgets config
  ansible.builtin.template:
    src: widgets.yaml.j2
    dest: /etc/homepage/config/widgets.yaml
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Deploy homepage settings (templated)
  ansible.builtin.template:
    src: settings.yaml.j2
    dest: /etc/homepage/config/settings.yaml
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart homepage

- name: Deploy homepage static config files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/homepage/config/
    owner: root
    group: root
    mode: "0644"
  become: true
  loop:
    - bookmarks.yaml
    - docker.yaml

- name: Deploy homepage quadlet
  ansible.builtin.copy:
    src: homepage.container
    dest: /etc/containers/systemd/homepage.container
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd daemon

- name: Flush handlers to reload systemd
  ansible.builtin.meta: flush_handlers

- name: Reload systemd daemon before starting homepage
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Enable system Podman socket (for container auto-discovery)
  ansible.builtin.systemd:
    name: podman.socket
    state: started
    enabled: true
  become: true

- name: Enable and start homepage service
  ansible.builtin.systemd:
    name: homepage.service
    state: started
    enabled: true
  become: true
