---
- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: "0700"

- name: Ensure SSH ControlPath directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/cp"
    state: directory
    mode: "0700"

- name: Set SSH key path facts
  ansible.builtin.set_fact:
    priv_key: "{{ ansible_facts['env']['HOME'] }}/.ssh/id_ed25519"
    pub_key: "{{ ansible_facts['env']['HOME'] }}/.ssh/id_ed25519.pub"

- name: Check if private key exists on disk
  ansible.builtin.stat:
    path: "{{ priv_key }}"
  register: priv_key_stat

# ── Key missing — fetch from BW or generate ──
- name: Fetch SSH key from Bitwarden
  ansible.builtin.shell: |
    set -euo pipefail
    BW_ITEM=$(bw get item "{{ user_login }}@{{ inventory_hostname }}" 2>/dev/null) || exit 1
    echo "$BW_ITEM" | python3 -c "
    import sys, json
    item = json.load(sys.stdin)
    ssh = item.get('sshKey', {})
    priv = ssh.get('privateKey', '')
    pub = ssh.get('publicKey', '')
    if not priv or not pub:
        sys.exit(1)
    with open('{{ priv_key }}', 'w') as f:
        f.write(priv + ('' if priv.endswith('\n') else '\n'))
    with open('{{ pub_key }}', 'w') as f:
        f.write(pub + ('' if pub.endswith('\n') else '\n'))
    "
    chmod 600 "{{ priv_key }}"
    chmod 644 "{{ pub_key }}"
  args:
    executable: /bin/bash
  register: bw_fetch_result
  failed_when: false
  changed_when: bw_fetch_result.rc == 0
  when: not priv_key_stat.stat.exists
  environment:
    BW_SESSION: "{{ bw_session | default('') }}"
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Generate new SSH key pair if not on disk or in BW
  ansible.builtin.command: >
    ssh-keygen -t ed25519 -C "{{ inventory_hostname }}"
    -f "{{ priv_key }}" -N ""
  when: not priv_key_stat.stat.exists and bw_fetch_result.rc | default(1) != 0

# ── Fix permissions ──
- name: Set key permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
  loop:
    - {path: "{{ priv_key }}", mode: "0600"}
    - {path: "{{ pub_key }}", mode: "0644"}

# ── Sync local key with Bitwarden ─────────────────────────────────
# Gated on `bw_unlocked` (set by the bitwarden role earlier in the play).
# Local disk is the source of truth. On every run:
#   - if BW has no item   → create
#   - if BW pubkey ≠ disk → edit (THIS is the case the old role missed,
#                          which left stale public keys in BW and broke
#                          authorized_keys distribution after a key change)
#   - if BW pubkey == disk → no-op
# Skipped when the vault is locked; next unlocked apply will heal it.
- name: Sync local SSH key to Bitwarden (create or update on mismatch)
  ansible.builtin.shell: |
    python3 - <<'PY'
    import json, os, subprocess, sys

    name = os.environ["BW_ITEM_NAME"]
    priv = open(os.environ["PRIV_PATH"]).read()
    pub_parts = open(os.environ["PUB_PATH"]).read().strip().split()
    pub_norm = pub_parts[0] + " " + pub_parts[1]
    fp = subprocess.run(
        ["ssh-keygen", "-lf", os.environ["PUB_PATH"]],
        capture_output=True, text=True, check=True,
    ).stdout.split()[1]

    r = subprocess.run(["bw", "get", "item", name], capture_output=True, text=True)
    if r.returncode == 0 and r.stdout.strip():
        item = json.loads(r.stdout)
        if item.get("sshKey", {}).get("publicKey", "").strip() == pub_norm:
            print("MATCH")
            sys.exit(0)
        item["sshKey"] = {"privateKey": priv, "publicKey": pub_norm, "keyFingerprint": fp}
        encoded = subprocess.run(
            ["bw", "encode"], input=json.dumps(item),
            capture_output=True, text=True, check=True,
        ).stdout
        subprocess.run(
            ["bw", "edit", "item", item["id"]], input=encoded,
            capture_output=True, text=True, check=True,
        )
        print("UPDATED")
    else:
        item = {
            "type": 5, "name": name,
            "sshKey": {"privateKey": priv, "publicKey": pub_norm, "keyFingerprint": fp},
        }
        encoded = subprocess.run(
            ["bw", "encode"], input=json.dumps(item),
            capture_output=True, text=True, check=True,
        ).stdout
        subprocess.run(
            ["bw", "create", "item"], input=encoded,
            capture_output=True, text=True, check=True,
        )
        print("CREATED")
    PY
  args:
    executable: /bin/bash
  register: bw_sync
  changed_when: bw_sync.stdout is search("UPDATED|CREATED")
  when: bw_unlocked | default(false)
  environment:
    BW_SESSION: "{{ bw_session | default('') }}"
    BW_ITEM_NAME: "{{ user_login }}@{{ inventory_hostname }}"
    PRIV_PATH: "{{ priv_key }}"
    PUB_PATH: "{{ pub_key }}"
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"

# ── Update allowed_signers for git commit signing ──
- name: Read public key
  ansible.builtin.slurp:
    src: "{{ pub_key }}"
  register: pub_key_content

- name: Set allowed_signers facts
  ansible.builtin.set_fact:
    signers_pub_key: "{{ pub_key_content.content | b64decode | trim }}"
    signers_key_body: "{{ (pub_key_content.content | b64decode).split()[1] }}"

- name: Ensure allowed_signers file exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/allowed_signers"
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Remove stale entries for this key
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/allowed_signers"
    regexp: "{{ signers_key_body }}"
    state: absent

- name: Add current key to allowed_signers
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/allowed_signers"
    line: "{{ user_email }} namespaces=\"git\" {{ signers_pub_key }}"
    create: true
    mode: "0644"

# ── Manage known_hosts for all fleet machines ────────────────────
# Scan each remote fleet machine's host key, flush stale entries, then
# add only the current key. Prevents "REMOTE HOST IDENTIFICATION CHANGED"
# warnings when machines get rebuilt.
- name: Scan host key for each fleet machine
  ansible.builtin.command: >-
    ssh-keyscan -t ed25519 -T 5 {{ hostvars[item]['ansible_host'] | default(machines[item]['hostname']) }}
  register: host_key_scan
  changed_when: false
  failed_when: false
  loop: "{{ machines.keys() | list }}"
  when: item != inventory_hostname

- name: Remove stale known_hosts entries
  ansible.builtin.known_hosts:
    name: "{{ hostvars[item.item]['ansible_host'] | default(machines[item.item]['hostname']) }}"
    state: absent
  loop: "{{ host_key_scan.results | default([]) }}"
  when:
    - item.rc is defined
    - item.rc == 0
    - item.stdout | length > 0
  loop_control:
    label: "{{ item.item }}"

- name: Add current host key to known_hosts
  ansible.builtin.known_hosts:
    name: "{{ hostvars[item.item]['ansible_host'] | default(machines[item.item]['hostname']) }}"
    key: "{{ item.stdout }}"
    state: present
    hash_host: false
  loop: "{{ host_key_scan.results | default([]) }}"
  when:
    - item.rc is defined
    - item.rc == 0
    - item.stdout | length > 0
  loop_control:
    label: "{{ item.item }}"

# ── Distribute all machine keys to authorized_keys ──
# One bw list call to get all SSH keys, then write authorized_keys in one shot.
# Skipped silently when BW is locked, and the writer below refuses to overwrite
# if BW returned no keys — otherwise a session hiccup would wipe authorized_keys.
- name: Fetch all machine SSH public keys from Bitwarden (batch)
  ansible.builtin.shell: |
    set -euo pipefail
    MACHINE_NAMES="{{ machines.keys() | list | join(' ') }}"
    bw list items --session "{{ bw_session | default('') }}" 2>/dev/null | python3 -c "
    import sys, json
    items = json.load(sys.stdin)
    names = set('{{ user_login }}@' + m for m in '${MACHINE_NAMES}'.split())
    keys = []
    for item in items:
        if item.get('name') in names:
            pub = item.get('sshKey', {}).get('publicKey', '').strip()
            if pub:
                keys.append(pub)
    print('\n'.join(keys))
    "
  args:
    executable: /bin/bash
  register: all_machine_keys
  changed_when: false
  failed_when: false
  when: bw_unlocked | default(false)
  environment:
    BW_SESSION: "{{ bw_session | default('') }}"
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Write authorized_keys with all machine public keys
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.ssh/authorized_keys"
    content: "{{ (all_machine_keys.stdout_lines + extra_authorized_keys) | unique | join('\n') }}\n"
    mode: "0600"
  when:
    - all_machine_keys.stdout_lines is defined
    - all_machine_keys.stdout_lines | length > 0
