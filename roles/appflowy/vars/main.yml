---
# AppFlowy Cloud configuration
# (Passwords are now in host_vars/bihar.yml for persistence)

appflowy_minio_access_key: "appflowy"
appflowy_external_url: "https://bihar.manatee-basking.ts.net/appflowy"

# Google OAuth (user should provide these via BW or extra_vars)
appflowy_google_client_id: "{{ lookup('env', 'APPFLOWY_GOOGLE_CLIENT_ID') | default('') }}"
appflowy_google_client_secret: "{{ lookup('env', 'APPFLOWY_GOOGLE_CLIENT_SECRET') | default('') }}"
