---
- name: Ensure configuration directory exists
  ansible.builtin.file:
    path: "~/.config/containers/systemd"
    state: directory
    mode: "0755"

- name: Deploy AppFlowy Quadlets
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "~/.config/containers/systemd/{{ item }}"
    mode: "0644"
  loop:
    - appflowy.network
    - appflowy-db-data.volume
    - appflowy-db.container
    - appflowy-redis.container
    - appflowy-s3-data.volume
    - appflowy-s3.container
    - appflowy-cloud.container
  register: appflowy_quadlets

- name: Reload systemd to apply Quadlets
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  when: appflowy_quadlets.changed

- name: Start AppFlowy services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    scope: user
  loop:
    - appflowy-db.service
    - appflowy-redis.service
    - appflowy-s3.service
    - appflowy-cloud.service
