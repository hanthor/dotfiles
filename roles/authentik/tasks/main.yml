---
- name: Ensure configuration directory exists
  ansible.builtin.file:
    path: "~/.config/containers/systemd"
    state: directory
    mode: "0755"

- name: Deploy Authentik Quadlets
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "~/.config/containers/systemd/{{ item }}"
    mode: "0644"
  loop:
    - authentik.network
    - authentik-db-data.volume
    - authentik-media.volume
    - authentik-certs.volume
    - authentik-custom-templates.volume
    - authentik-db.container
    - authentik-redis.container
    - authentik-server.container
    - authentik-worker.container
  register: authentik_quadlets

- name: Reload systemd to apply Quadlets
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  when: authentik_quadlets.changed

- name: Start Authentik services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    scope: user
  loop:
    - authentik-db.service
    - authentik-redis.service
    - authentik-server.service
    - authentik-worker.service
