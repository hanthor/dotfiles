---
- name: Fix broken flatpak symlink if present
  ansible.builtin.shell: |
    if [ -L /var/lib/flatpak ] && [ ! -e /var/lib/flatpak ]; then
      rm /var/lib/flatpak
      mkdir -p /var/lib/flatpak
    fi
  become: true
  changed_when: false

- name: Add flathub remote (system)
  ansible.builtin.command: flatpak remote-add --if-not-exists --system {{ item.name }} {{ item.url }}
  loop: "{{ flatpak_remotes }}"
  become: true
  changed_when: false

- name: Remove unwanted flatpaks if present
  ansible.builtin.shell: |
    REMOVE=""
    for pkg in org.mozilla.firefox org.mozilla.Thunderbird; do
      flatpak info --system "$pkg" >/dev/null 2>&1 && REMOVE="$REMOVE $pkg"
    done
    if [ -n "$REMOVE" ]; then
      flatpak uninstall --system -y $REMOVE
      echo "removed:$REMOVE"
    fi
  become: true
  register: flatpak_remove
  changed_when: "'removed:' in flatpak_remove.stdout"
  failed_when: false

- name: Get list of installed system flatpaks
  ansible.builtin.command: flatpak list --system --columns=application --app
  register: installed_flatpaks
  changed_when: false
  become: true
  failed_when: false

- name: Set missing flatpaks fact
  ansible.builtin.set_fact:
    missing_flatpaks: "{{ system_flatpaks | reject('in', installed_flatpaks.stdout_lines) | list }}"

# Fast path: try all missing apps in one batch command
- name: Install missing system flatpaks (batch)
  ansible.builtin.shell: |
    flatpak install --system -y flathub {{ missing_flatpaks | join(' ') }} 2>&1
  become: true
  register: flatpak_batch
  when: missing_flatpaks | length > 0
  changed_when: flatpak_batch.rc == 0
  failed_when: false

# Slow path: re-run individually only for the apps that failed (keeps the common case fast)
- name: Install flatpaks that failed in batch (individually, tolerating bad IDs)
  ansible.builtin.command: flatpak install --system -y flathub {{ item }}
  loop: "{{ missing_flatpaks }}"
  become: true
  register: flatpak_individual
  when: missing_flatpaks | length > 0 and flatpak_batch.rc | default(0) != 0
  changed_when: flatpak_individual.rc == 0
  failed_when: false

- name: Update all flatpaks
  ansible.builtin.command: flatpak update --system -y
  become: true
  when: upgrade | default(false) | bool
  changed_when: true
  ignore_errors: true

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    state: directory
    mode: "0755"

- name: Create chromium wrapper scripts pointing to ungoogled-chromium
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/{{ item }}"
    content: |
      #!/usr/bin/env bash
      exec flatpak run com.github.Eloston.UngoogledChromium "$@"
    mode: "0755"
  loop:
    - google-chrome
    - chromium-browser
    - chromium
