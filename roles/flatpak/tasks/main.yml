---
- name: Add flathub remote (system)
  ansible.builtin.command: flatpak remote-add --if-not-exists --system {{ item.name }} {{ item.url }}
  loop: "{{ flatpak_remotes }}"
  become: true
  changed_when: false

- name: Remove unwanted flatpaks if present
  ansible.builtin.shell: |
    flatpak uninstall --system --nonexistent -y {{ item }} 2>/dev/null || true
  loop:
    - org.mozilla.firefox
    - org.mozilla.Thunderbird
  become: true
  changed_when: false

- name: Install system flatpaks
  ansible.builtin.shell: |
    if ! flatpak info --system {{ item }} >/dev/null 2>&1; then
      flatpak install --system -y flathub {{ item }}
      echo installed
    fi
  loop: "{{ system_flatpaks }}"
  become: true
  register: flatpak_results
  changed_when: "'installed' in flatpak_results.stdout"
  async: 300
  poll: 0

- name: Wait for flatpak installs to complete
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ flatpak_results.results }}"
  register: flatpak_wait
  until: flatpak_wait.finished
  retries: 60
  delay: 5
  become: true

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    state: directory
    mode: "0755"

- name: Create chromium wrapper scripts pointing to ungoogled-chromium
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/{{ item }}"
    content: |
      #!/usr/bin/env bash
      exec flatpak run com.github.Eloston.UngoogledChromium "$@"
    mode: "0755"
  loop:
    - google-chrome
    - chromium-browser
    - chromium
