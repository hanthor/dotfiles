# PipeWire filter-chain — Speaker DSP (output)
#
# Replaces Easy Effects output preset "output-speaker-improvement.json".
#
# Chain: 16-band Parametric EQ → Bass Enhancer → Exciter → Limiter
#
# PREREQUISITES (must be in bootc image):
#   lsp-plugins-lv2   →  ParaEQ x16, Bass Enhancer, Exciter, Limiter
#
# VERIFY after deploy (run on target machine):
#   lv2ls | grep lsp-plug
#   lv2info http://lsp-plug.in/plugins/lv2/para_equalizer_x16_lr | grep -A2 'port.*symbol'
#
# TROUBLESHOOTING:
#   journalctl --user -u pipewire -f          → watch for errors
#   pw-cli ls Node | grep -i speaker_dsp      → check if node appears
#   wpctl status                              → check routing
#
# SIMPLER CHAIN: comment out "bass" and "exciter" nodes + their links
# for a crash-proof EQ+Limiter-only chain.

context.modules = [
  {
    name = libpipewire-module-filter-chain
    args = {
      node.description = "Speaker DSP"
      media.name       = "Speaker DSP"

      # ── DSP graph ──────────────────────────────────────────────────
      filter.graph = {
        nodes = [
          # ── 1. Parametric EQ (16-band, RLC BT) ──────────────────────
          #     Translates the 15-band Easy Effects preset.
          #     Band 0 is the subsonic HPF (120 Hz, 12 dB/oct).
          #     Bands 1-14 are the corrective bell curve.
          {
            type   = lv2
            name   = eq
            plugin = "http://lsp-plug.in/plugins/lv2/para_equalizer_x16_lr"
            control = {
              # Band 0: HPF @ 120 Hz, Q=0.7, RLC (BT), slope x2
              b0t = 7       # High-pass
              b0m = 8       # RLC (BT)
              b0f = 120.0   # Hz
              b0q = 0.7
              b0g = 0.0
              b0s = 0       # solo off
              # Band 1: Bell @ 150 Hz, 0 dB — neutral placeholder
              b1t = 1       # Bell
              b1m = 8
              b1f = 150.0
              b1g = 0.0
              b1q = 1.0
              b1s = 0
              # Band 2: Bell @ 220 Hz, -2.5 dB — cut boxy low-mids
              b2t = 1
              b2m = 8
              b2f = 220.0
              b2g = -2.5
              b2q = 1.2
              b2s = 0
              # Band 3: Bell @ 350 Hz, -2.0 dB
              b3t = 1
              b3m = 8
              b3f = 350.0
              b3g = -2.0
              b3q = 1.2
              b3s = 0
              # Band 4: Bell @ 600 Hz, -1.5 dB
              b4t = 1
              b4m = 8
              b4f = 600.0
              b4g = -1.5
              b4q = 1.4
              b4s = 0
              # Band 5: Bell @ 1000 Hz, -1.0 dB
              b5t = 1
              b5m = 8
              b5f = 1000.0
              b5g = -1.0
              b5q = 1.4
              b5s = 0
              # Band 6: Bell @ 1500 Hz, +0.5 dB
              b6t = 1
              b6m = 8
              b6f = 1500.0
              b6g = 0.5
              b6q = 1.4
              b6s = 0
              # Band 7: Bell @ 2200 Hz, +2.5 dB
              b7t = 1
              b7m = 8
              b7f = 2200.0
              b7g = 2.5
              b7q = 1.4
              b7s = 0
              # Band 8: Bell @ 3200 Hz, +3.5 dB
              b8t = 1
              b8m = 8
              b8f = 3200.0
              b8g = 3.5
              b8q = 1.4
              b8s = 0
              # Band 9: Bell @ 4500 Hz, +3.0 dB
              b9t = 1
              b9m = 8
              b9f = 4500.0
              b9g = 3.0
              b9q = 1.4
              b9s = 0
              # Band 10: Bell @ 6000 Hz, +1.5 dB
              b10t = 1
              b10m = 8
              b10f = 6000.0
              b10g = 1.5
              b10q = 1.4
              b10s = 0
              # Band 11: Bell @ 8000 Hz, +1.5 dB
              b11t = 1
              b11m = 8
              b11f = 8000.0
              b11g = 1.5
              b11q = 1.4
              b11s = 0
              # Band 12: Bell @ 10000 Hz, +2.0 dB
              b12t = 1
              b12m = 8
              b12f = 10000.0
              b12g = 2.0
              b12q = 1.4
              b12s = 0
              # Band 13: Bell @ 13000 Hz, +1.5 dB
              b13t = 1
              b13m = 8
              b13f = 13000.0
              b13g = 1.5
              b13q = 1.4
              b13s = 0
              # Band 14: Bell @ 17000 Hz, 0 dB — air presence
              b14t = 1
              b14m = 8
              b14f = 17000.0
              b14g = 0.0
              b14q = 1.4
              b14s = 0
            }
          }

          # ── 2. Bass Enhancer ─────────────────────────────────────
          #     Adds sub-harmonic richness. Comment out for simpler chain.
          {
            type   = lv2
            name   = bass
            plugin = "http://lsp-plug.in/plugins/lv2/bass_enhancer_stereo"
            control = {
              freq = 80.0     # floor frequency (Hz)
              dri  = 8.0      # drive / amount
              dry  = 0.3      # 1.0 - blend
              wet  = 0.7      # blend
            }
          }

          # ── 3. Exciter (Crystalizer substitute) ───────────────────
          #     Multi-band harmonic exciter for presence and air.
          #     Comment out for simpler chain.
          {
            type   = lv2
            name   = exciter
            plugin = "http://lsp-plug.in/plugins/lv2/exciter_stereo"
            control = {
              freq = 4000.0   # transition band (Hz)
              dri  = 1.0      # drive
              dry  = 0.5      # dry mix
              wet  = 0.5      # wet mix
              harm = 1.2      # harmonics
              blnd = 1.0      # blend
            }
          }

          # ── 4. Limiter — catch peaks, prevent clipping ───────────
          {
            type   = lv2
            name   = lim
            plugin = "http://lsp-plug.in/plugins/lv2/limiter_stereo"
            control = {
              at    = 5.0      # attack (ms)
              rt    = 50.0     # release (ms)
              th    = -0.5     # threshold (dB)
              kn    = 1.0      # knee (dB)
              lk    = 5.0      # lookahead (ms)
              ovs   = 0        # 0=no oversampling
              alr   = 0        # ALR off
              slink = 100.0    # stereo link (%)
            }
          }
        ]

        # ── Audio routing (stereo chain) ─────────────────────────
        links = [
          { output = "eq:Out",     input = "bass:In"    }
          { output = "bass:Out",   input = "exciter:In" }
          { output = "exciter:Out", input = "lim:In"    }
        ]
      }

      # ── Graph I/O (how this filter sits in the PipeWire graph) ──
      #
      # Same node.name on both sides makes this a single filter node.
      # PipeWire will not route the playback back to the capture port
      # of the same node, so the playback auto-connects to the real
      # hardware sink.
      capture.props = {
        node.name        = "speaker_dsp"
        node.description = "Speakers (DSP)"
        media.class      = "Audio/Sink"
        audio.position   = ["FL" "FR"]
        priority.session = 2000
      }
      playback.props = {
        node.name        = "speaker_dsp"
        node.description = "Speakers (DSP)"
        media.class      = "Audio/Sink"
        audio.position   = ["FL" "FR"]
        node.passive     = true
        priority.session = 2000
      }
    }
  }
]
