# PipeWire filter-chain — Microphone DSP (input)
#
# Replaces Easy Effects input preset "input-mic-noise-reduction.json".
#
# Chain: RNNoise noise suppression → Compressor
#
# PREREQUISITES (must be in bootc image):
#   noise-suppression-for-voice  →  librnnoise_ladspa.so (LADSPA)
#   lsp-plugins-lv2              →  Compressor Stereo
#
# VERIFY after deploy:
#   ls /usr/lib64/ladspa/librnnoise_ladspa.so
#   lv2ls | grep compressor_stereo
#
# LSP port names verified with:
#   lv2info http://lsp-plug.in/plugins/lv2/compressor_stereo | grep -A2 'port.*symbol'

context.modules = [
  {
    name = libpipewire-module-filter-chain
    args = {
      node.description = "Mic DSP"
      media.name       = "Mic DSP"

      filter.graph = {
        nodes = [
          # ── 1. RNNoise noise suppression (LADSPA) ────────────────
          {
            type   = ladspa
            name   = rnnoise
            plugin = "/usr/lib64/ladspa/librnnoise_ladspa.so"
            label  = "noise_suppressor_stereo"
            control = {
              "Wet"              = 1.0   # 1.0 = full noise suppression
              "Release"          = 20.0  # fast release for speech (ms)
              "VAD Threshold (%)" = 50.0 # voice activity detection threshold
            }
          }

          # ── 2. Compressor — tames mic level spikes ───────────────
          #     Easy Effects preset: downward compression, -24 dB,
          #     2:1 ratio, 5 ms attack, 100 ms release.
          {
            type   = lv2
            name   = comp
            plugin = "http://lsp-plug.in/plugins/lv2/compressor_stereo"
            control = {
              at  = 5.0       # attack (ms)
              rt  = 100.0     # release (ms)
              pth = -24.0     # peak threshold (dB)
              ra  = 2.0       # ratio
              kn  = 3.0       # knee (dB), LSP uses absolute value
              mk  = 0.0       # makeup gain (dB)
              scm = 0         # sidechain: feed-forward
            }
          }
        ]

        links = [
          { output = "rnnoise:Out", input = "comp:In" }
        ]
      }

      # ── Mic input routing ──────────────────────────────────────
      #   capture: Audio/Sink → receives audio from hardware mic
      #   playback: Audio/Source → apps record from this virtual mic
      #
      #   Same node.name on both sides = single filter node.
      #   WirePlumber will link the capture sink to the hardware source
      #   when this node is set as the default source.
      capture.props = {
        node.name        = "mic_dsp"
        node.description = "Microphone (DSP)"
        media.class      = "Audio/Sink"
        priority.session = 2000
      }
      playback.props = {
        node.name        = "mic_dsp"
        node.description = "Microphone (DSP)"
        media.class      = "Audio/Source"
        priority.session = 2000
      }
    }
  }
]
