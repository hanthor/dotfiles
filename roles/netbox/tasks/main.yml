---
- name: Create NetBox config directory
  ansible.builtin.file:
    path: /etc/netbox
    state: directory
    mode: "0750"
    owner: root
    group: root
  become: true

- name: Initialize NetBox secret defaults
  ansible.builtin.set_fact:
    netbox_db_password: ""
    netbox_secret_key: ""
    netbox_superuser_password: ""
    netbox_api_token: ""
  no_log: true

- name: Fetch NetBox secrets from Bitwarden
  when: bw_session | default('') | length > 0
  no_log: true
  environment:
    BW_SESSION: "{{ bw_session }}"
    PATH: "{{ ansible_env_path }}"
  block:
    - name: Fetch DB password
      ansible.builtin.command: bw get password netbox-db-password
      register: _netbox_db_password
      changed_when: false

    - name: Fetch Django secret key
      ansible.builtin.command: bw get password netbox-secret-key
      register: _netbox_secret_key
      changed_when: false

    - name: Fetch superuser password
      ansible.builtin.command: bw get password netbox-superuser-password
      register: _netbox_superuser_password
      changed_when: false

    - name: Fetch API token
      ansible.builtin.command: bw get password netbox-api-token
      register: _netbox_api_token
      changed_when: false

- name: Set NetBox secret facts
  ansible.builtin.set_fact:
    netbox_db_password: "{{ _netbox_db_password.stdout }}"
    netbox_secret_key: "{{ _netbox_secret_key.stdout }}"
    netbox_superuser_password: "{{ _netbox_superuser_password.stdout }}"
    netbox_api_token: "{{ _netbox_api_token.stdout }}"
  no_log: true
  when:
    - bw_session | default('') | length > 0
    - (_netbox_db_password.stdout | default('')) | length > 0

- name: Deploy PostgreSQL credentials
  ansible.builtin.template:
    src: postgres.env.j2
    dest: /etc/netbox/postgres.env
    mode: "0640"
    owner: root
    group: root
  become: true
  no_log: true
  notify: Restart NetBox
  when: netbox_db_password | default('') | length > 0

- name: Deploy NetBox environment config
  ansible.builtin.template:
    src: netbox.env.j2
    dest: /etc/netbox/netbox.env
    mode: "0640"
    owner: root
    group: root
  become: true
  no_log: true
  notify: Restart NetBox
  when: netbox_db_password | length > 0

- name: Deploy Podman quadlet files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/containers/systemd/
    owner: root
    group: root
    mode: "0644"
  become: true
  loop:
    - netbox.network
    - netbox-postgres.volume
    - netbox-media.volume
    - netbox-postgres.container
    - netbox-redis.container
    - netbox.container
    - netbox-worker.container
  notify: Reload systemd daemon

- name: Check Tailscale serve config
  ansible.builtin.command: tailscale serve status
  register: ts_serve_status
  changed_when: false
  failed_when: false
  become: true

- name: Expose NetBox via Tailscale HTTPS on port 8444
  ansible.builtin.command: tailscale serve --bg --https=8444 http://127.0.0.1:8080
  when: "'8444' not in (ts_serve_status.stdout | default(''))"
  become: true

- name: Flush handlers before starting services
  ansible.builtin.meta: flush_handlers

- name: Reload systemd daemon before starting services
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Enable and start NetBox services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  become: true
  loop:
    - netbox-postgres.service
    - netbox-redis.service
    - netbox.service
    - netbox-worker.service
