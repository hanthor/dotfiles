is_arm: false
has_homepage: true
has_proxy: true
monitoring_hub: true
tailscale_advertise_routes: "192.168.0.0/24"
tailscale_accept_dns: false
tailscale_operator: james
web_services:
  - name: Proxmox
    href: https://bihar.manatee-basking.ts.net/proxmox
    icon: proxmox.png
    description: Hypervisor
    group: Infrastructure
    siteMonitor: https://bihar.manatee-basking.ts.net:8006
  - name: NetBox
    href: https://bihar.manatee-basking.ts.net:8444
    icon: netbox.png
    description: Network documentation
    group: Infrastructure
    siteMonitor: https://bihar.manatee-basking.ts.net:8444
  - name: Lima
    href: https://bihar.manatee-basking.ts.net/lima
    icon: mdi-virtual-machine
    description: VM dashboard + bootc builder
    group: Infrastructure
    siteMonitor: http://127.0.0.1:8007
  - name: Cockpit
    href: https://bihar.manatee-basking.ts.net/cockpit
    icon: cockpit.png
    description: System management
    group: System
  - name: Grafana
    href: https://bihar.manatee-basking.ts.net/grafana
    icon: grafana.png
    description: Metrics and logs dashboards
    group: Monitoring
    siteMonitor: https://bihar.manatee-basking.ts.net/grafana
  - name: Prometheus
    href: http://bihar.manatee-basking.ts.net:9091
    icon: prometheus.png
    description: Metrics (hub)
    group: Monitoring
    siteMonitor: http://bihar.manatee-basking.ts.net:9091
  - name: Alertmanager
    href: http://bihar.manatee-basking.ts.net:9093
    icon: prometheus.png
    description: Alert routing
    group: Monitoring
    siteMonitor: http://bihar.manatee-basking.ts.net:9093
