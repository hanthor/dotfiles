[book]
title = "Dotfiles Fleet Handbook"
authors = ["James Reilly"]
language = "en"
description = "Ansible-driven dotfiles and infrastructure for a personal fleet of desktops, servers, and VPS"

[build]
build-dir = "book"

[output.html]
no-section-label = true
git-repository-url = "https://github.com/hanthor/dotfiles"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/hanthor/dotfiles/edit/master/{path}"

[output.html.fold]
enable = true
level = 1
