[book]
title = "Dotfiles & Infra Handbook"
authors = ["James Reilly"]
description = "Personal fleet, Talos cluster, and Ansible workstation config"
language = "en"
src = "."

[build]
build-dir = "../target/book"
create-missing = false

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/hanthor/dotfiles"
edit-url-template = "https://github.com/hanthor/dotfiles/edit/master/docs/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 1
